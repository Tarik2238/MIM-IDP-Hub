<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player · Mics in Motion</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c10;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2128;
  --border:#21262d;--border2:#30363d;
  --text:#e6edf3;--muted:#7d8590;--muted2:#9198a1;
  --orange:#C4722A;--orange-dim:#7a4419;--orange-glow:rgba(196,114,42,.15);
  --green:#238636;--green-light:#2ea043;--red:#da3633;
  --radius:8px;--team-color:#C4722A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
nav{background:rgba(13,17,23,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#fff;text-decoration:none;}
.brand em{color:var(--orange);font-style:normal;}
.nav-mid{display:flex;gap:4px;}
.nav-link{font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .15s;}
.nav-link:hover{color:var(--text);background:var(--bg3);}
.nav-link.active{color:var(--orange);background:var(--orange-glow);}
.nav-search-wrap{position:relative;}
.nav-search{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:7px 34px 7px 13px;width:190px;outline:none;transition:all .2s;}
.nav-search:focus{border-color:var(--orange);width:250px;box-shadow:0 0 0 3px var(--orange-glow);}
.nav-search::placeholder{color:var(--muted);}
.nav-si{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:15px;}
.nav-res{position:absolute;top:calc(100% + 8px);right:0;width:310px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;max-height:340px;overflow-y:auto;}
.nav-res.open{display:block;}
.nri{display:flex;align-items:center;gap:10px;padding:10px 14px;text-decoration:none;color:var(--text);transition:background .1s;border-bottom:1px solid var(--border);}
.nri:last-child{border-bottom:none;}
.nri:hover{background:var(--bg4);}
.nri-hs{width:34px;height:34px;border-radius:4px;object-fit:cover;object-position:top;background:var(--bg2);flex-shrink:0;}
.nri-fb{width:34px;height:34px;border-radius:4px;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--muted);}
.nri-name{font-weight:600;font-size:13px;}
.nri-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.nri-b{font-family:'Bebas Neue',sans-serif;font-size:10px;padding:1px 6px;border-radius:3px;background:var(--orange-glow);color:var(--orange);border:1px solid var(--orange-dim);margin-left:auto;flex-shrink:0;letter-spacing:1px;}
.breadcrumb{padding:9px 32px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg2);}
.breadcrumb a{color:var(--muted);text-decoration:none;}
.breadcrumb a:hover{color:var(--text);}
.player-header{position:relative;overflow:hidden;border-bottom:1px solid var(--border);}
.ph-bg-color{position:absolute;inset:0;opacity:.18;}
.ph-bg-grad{position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,12,16,0) 0%,rgba(8,12,16,.7) 50%,rgba(8,12,16,1) 100%);}
.ph-bg-grad2{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,12,16,0) 0%,rgba(8,12,16,.5) 100%);}
.ph-logo-bg{position:absolute;right:0;top:50%;transform:translateY(-50%);height:110%;width:auto;opacity:.18;filter:blur(2px) saturate(0.5);object-fit:contain;pointer-events:none;}
.ph-inner{position:relative;z-index:1;padding:40px 48px 36px;display:flex;gap:36px;align-items:center;}
.ph-hs-wrap{flex-shrink:0;position:relative;}
.ph-hs{width:160px;height:160px;border-radius:12px;object-fit:cover;object-position:top center;border:3px solid rgba(255,255,255,.1);background:var(--bg3);box-shadow:0 12px 40px rgba(0,0,0,.6);}
.ph-hs-fb{width:160px;height:160px;border-radius:12px;background:var(--bg3);border:3px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:58px;color:var(--muted);box-shadow:0 12px 40px rgba(0,0,0,.6);}
.ph-team-badge{position:absolute;bottom:-8px;right:-8px;width:42px;height:42px;border-radius:50%;background:var(--bg2);border:3px solid var(--border);object-fit:contain;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,.5);}
.ph-info{flex:1;min-width:0;}
.ph-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.badge{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;padding:4px 11px;border-radius:5px;}
.bp{background:var(--orange-glow);color:var(--orange);border:1px solid var(--orange-dim);}
.bt{background:rgba(46,160,67,.12);color:var(--green-light);border:1px solid rgba(46,160,67,.25);}
.bfa{background:rgba(31,111,235,.1);color:#58a6ff;border:1px solid rgba(31,111,235,.2);}
.bact{background:rgba(46,160,67,.12);color:var(--green-light);border:1px solid rgba(46,160,67,.25);}
.binj{background:rgba(218,54,51,.12);color:var(--red);border:1px solid rgba(218,54,51,.25);}
.bother{background:rgba(125,133,144,.1);color:var(--muted2);border:1px solid var(--border2);}
.bnum{background:transparent;color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.12);font-size:14px;padding:3px 10px;}
.ph-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,5.5vw,72px);letter-spacing:3px;color:#fff;line-height:.95;margin-bottom:6px;text-shadow:0 2px 16px rgba(0,0,0,.6);}
.ph-sub{font-size:16px;color:rgba(255,255,255,.55);font-weight:500;margin-bottom:22px;}
.vitals{display:flex;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius);overflow:hidden;backdrop-filter:blur(8px);width:fit-content;}
.vit{padding:14px 24px;border-right:1px solid rgba(255,255,255,.05);text-align:center;}
.vit:last-child{border-right:none;}
.vit-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#fff;line-height:1;}
.vit-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:4px;}
.ph-extra{margin-top:16px;display:flex;gap:24px;flex-wrap:wrap;}
.ph-ei{font-size:13px;color:rgba(255,255,255,.45);}
.ph-ei strong{color:rgba(255,255,255,.75);font-weight:500;}
.main{padding:32px 48px 80px;}
.section{margin-bottom:36px;}
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:11px;border-bottom:1px solid var(--border);}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff;}
.sec-badge{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:var(--bg3);border:1px solid var(--border);padding:3px 9px;border-radius:4px;}
.sec-badge.live{color:var(--green-light);background:rgba(46,160,67,.08);border-color:rgba(46,160,67,.2);}
.sec-badge.pending{color:var(--muted);}
.cur-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;}
.cstat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px;text-align:center;transition:border-color .15s;}
.cstat:hover{border-color:var(--orange);}
.cstat-val{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--orange);line-height:1;}
.cstat-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:5px;}
.stats-ph{background:var(--bg3);border:1px dashed var(--border2);border-radius:var(--radius);padding:40px;text-align:center;}
.stats-ph p{color:var(--muted);font-size:13px;margin-top:8px;}
.cum-bar{display:flex;background:rgba(196,114,42,.07);border:1px solid rgba(196,114,42,.18);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;flex-wrap:wrap;}
.cum-s{flex:1;min-width:70px;padding:14px 10px;text-align:center;border-right:1px solid rgba(196,114,42,.1);}
.cum-s:last-child{border-right:none;}
.cum-v{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--orange);line-height:1;}
.cum-l{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(196,114,42,.55);margin-top:4px;}

/* ── HISTORY TABLE — bigger font ── */
.hist-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;}
.hist-table{width:100%;border-collapse:collapse;}
.hist-table th{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;padding:13px 12px;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap;background:var(--bg4);overflow:hidden;}
.hist-table th:first-child,.hist-table th:nth-child(2),.hist-table th:nth-child(3){text-align:left;}
.hist-table td{padding:13px 12px;border-bottom:1px solid var(--border);vertical-align:middle;text-align:right;overflow:hidden;}
.hist-table tr:last-child td{border-bottom:none;}
.hist-table tr.cur td{background:rgba(196,114,42,.04);}
.hist-table tr.cur td:first-child{border-left:3px solid var(--orange);}
.season-row{cursor:pointer;user-select:none;}
.season-row:hover td{background:rgba(255,255,255,.03);}
.season-row.cur:hover td{background:rgba(196,114,42,.06);}
.expand-arrow{display:inline-block;margin-right:6px;font-size:11px;color:var(--muted);transition:transform .2s;vertical-align:middle;}
.expand-arrow.open{transform:rotate(90deg);color:var(--orange);}

/* ── WEEKLY SUB-TABLE ── */
.weekly-row{display:none;}
.weekly-row.open{display:table-row;}
.weekly-table-wrap{background:var(--bg2);border-top:1px solid var(--border);}
.weekly-table{width:100%;border-collapse:collapse;}
.weekly-table th{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:600;padding:9px 12px;text-align:right;border-bottom:1px solid var(--border);background:rgba(0,0,0,.25);white-space:nowrap;overflow:hidden;}
.weekly-table th:first-child,.weekly-table th:nth-child(2){text-align:left;}
.weekly-table td{padding:9px 12px;border-bottom:1px solid rgba(33,38,45,.5);text-align:right;vertical-align:middle;overflow:hidden;}
.weekly-table td:first-child,.weekly-table td:nth-child(2){text-align:left;}
.weekly-table tr:last-child td{border-bottom:none;}
.weekly-table tr:hover td{background:rgba(255,255,255,.02);}
.weekly-loading{padding:22px;text-align:center;color:var(--muted);font-size:13px;font-style:italic;}

/* ── STAT CELL SIZES — bigger ── */
.yr{font-family:'Bebas Neue',sans-serif;font-size:19px;color:#fff;}
.now-badge{font-size:9px;color:var(--orange);font-weight:700;letter-spacing:1px;margin-left:6px;vertical-align:middle;}
.team-cell{display:flex;align-items:center;gap:8px;}
.tl{width:24px;height:24px;object-fit:contain;}
/* Season table stat values */
.sv{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);}
/* Stat column widths — shared between season and weekly tables */
.col-w{width:55px;min-width:55px;}
.col-pts{width:65px;min-width:65px;}
.col-snp{width:65px;min-width:65px;}
.col-stat{width:55px;min-width:55px;}
.col-left-s{width:110px;min-width:110px;} /* Season label */
.col-left-t{width:90px;min-width:90px;}  /* Team */
.col-left-p{width:75px;min-width:75px;}  /* Pos */
.col-avg{width:60px;min-width:60px;}
.col-gp{width:45px;min-width:45px;}
.sv.ch{color:var(--orange);}    /* career high */
.sv.pts{color:var(--orange);}   /* fantasy pts always orange */
.sv.z{font-size:16px;color:var(--muted);}  /* zero / no data */
/* Weekly table stat values (slightly smaller but still readable) */
.wv{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted2);}
.wv.z{color:var(--muted);font-size:14px;}
.wv.hi{color:var(--text);}
.wk-pts{color:var(--orange);font-family:'Bebas Neue',sans-serif;font-size:16px;}
.wk-yr{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--text);}

.hist-note{margin-top:8px;font-size:11px;color:var(--muted);text-align:right;}
.id-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.id-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.id-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.id-val{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--orange);word-break:break-all;}
.id-val.mt{color:var(--muted);font-size:13px;font-family:'Inter',sans-serif;font-style:italic;}
.id-src{font-size:10px;color:var(--muted);margin-top:3px;}
#pg-load{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:14px;}
#pg-load.done{display:none;}
.pl-t{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:var(--orange);}
.pl-s{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:900px){
  nav,.breadcrumb,.main{padding-left:20px;padding-right:20px;}
  .ph-inner{padding:28px 20px;flex-direction:column;gap:20px;}
  .ph-hs,.ph-hs-fb{width:120px;height:120px;}
  .ph-name{font-size:clamp(36px,8vw,56px);}
  .vitals{flex-wrap:wrap;}
  .vit{padding:11px 16px;}
  .cur-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>
<div id="pg-load"><div class="spinner"></div><div class="pl-t">LOADING PLAYER</div><div class="pl-s" id="pl-s">Connecting…</div></div>
<nav>
  <a href="index.html" class="brand">MICS IN <em>MOTION</em></a>
  <div class="nav-mid">
    <a href="index.html" class="nav-link">Home</a>
    <a href="players.html" class="nav-link active">Player DB</a>
    <a href="#" class="nav-link">Team Hub</a>
    <a href="#" class="nav-link">Rankings</a>
  </div>
  <div class="nav-search-wrap">
    <input class="nav-search" id="nav-search" type="text" placeholder="Search player…" oninput="onNavSearch()" autocomplete="off">
    <span class="nav-si">⌕</span>
    <div class="nav-res" id="nav-res"></div>
  </div>
</nav>
<div class="breadcrumb">
  <a href="index.html">Home</a><span>›</span>
  <a href="players.html">Player Database</a><span>›</span>
  <span id="bc-name">–</span>
</div>
<div id="player-header" style="display:none" class="player-header">
  <div class="ph-bg-color" id="ph-bg-color"></div>
  <img class="ph-logo-bg" id="ph-logo-bg" src="" alt="" onerror="this.style.display='none'">
  <div class="ph-bg-grad"></div><div class="ph-bg-grad2"></div>
  <div class="ph-inner">
    <div class="ph-hs-wrap">
      <img id="ph-hs" class="ph-hs" src="" alt="" onerror="this.style.display='none';document.getElementById('ph-fb').style.display='flex'">
      <div id="ph-fb" class="ph-hs-fb" style="display:none"></div>
      <img id="ph-tl" class="ph-team-badge" src="" alt="" onerror="this.style.display='none'">
    </div>
    <div class="ph-info">
      <div class="ph-badges" id="ph-badges"></div>
      <div class="ph-name" id="ph-name"></div>
      <div class="ph-sub" id="ph-sub-team"></div>
      <div class="vitals">
        <div class="vit"><div class="vit-val" id="v-ht">–</div><div class="vit-lbl">Height</div></div>
        <div class="vit"><div class="vit-val" id="v-wt">–</div><div class="vit-lbl">Weight</div></div>
        <div class="vit"><div class="vit-val" id="v-ag">–</div><div class="vit-lbl">Age</div></div>
        <div class="vit"><div class="vit-val" id="v-ex">–</div><div class="vit-lbl">NFL Exp</div></div>
      </div>
      <div class="ph-extra" id="ph-extra"></div>
    </div>
  </div>
</div>
<div class="main" id="main" style="display:none">
  <div class="section">
    <div class="sec-hdr">
      <div class="sec-title" id="cs-title">2026 Stats</div>
      <div class="sec-badge pending" id="cs-badge">Loading…</div>
    </div>
    <div id="cs-wrap"><div class="stats-ph"><p>Loading stats…</p></div></div>
  </div>
  <div class="section">
    <div class="sec-hdr">
      <div class="sec-title">Career History</div>
      <div class="sec-badge" id="hist-badge">–</div>
    </div>
    <div class="cum-bar" id="cum-bar" style="display:none"></div>
    <div class="hist-wrap">
      <table class="hist-table">
        <thead><tr>
          <th style="width:110px">Season</th><th style="width:90px">Team</th><th style="width:75px">Pos</th>
          <th style="width:60px">Avg</th><th style="width:60px">Pts</th><th style="width:45px">GP</th><th style="width:65px">Snp%</th><th style="width:60px">Snaps</th>
          <th style="width:55px">Solo</th><th style="width:55px">Ast</th><th style="width:55px">TKL</th>
          <th style="width:55px">TFL</th><th style="width:55px">SK</th><th style="width:60px">QBH</th><th style="width:60px">PBU</th>
          <th style="width:55px">INT</th><th style="width:50px">FR</th><th style="width:50px">FF</th><th style="width:55px">Safe</th><th style="width:50px">TD</th>
        </tr></thead>
        <tbody id="hist-body"></tbody>
      </table>
    </div>
    <div class="hist-note" id="hist-note"></div>
  </div>
  <div class="section">
    <div class="sec-hdr">
      <div class="sec-title">Player IDs</div>
      <div class="sec-badge">Reference</div>
    </div>
    <div class="id-grid" id="id-grid"></div>
  </div>
</div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────────
const SLEEPER_ALL = 'https://api.sleeper.app/v1/players/nfl';
const SL_S_D  = (id,yr)=>`https://api.sleeper.com/stats/nfl/player/${id}?season_type=regular&season=${yr}&grouping=season`;
const SL_S_P  = (id,yr)=>`https://corsproxy.io/?url=${encodeURIComponent('https://api.sleeper.com/stats/nfl/player/'+id+'?season_type=regular&season='+yr+'&grouping=season')}`;
const SL_W_D  = (id,yr)=>`https://api.sleeper.com/stats/nfl/player/${id}?season_type=regular&season=${yr}&grouping=week`;
const SL_W_P  = (id,yr)=>`https://corsproxy.io/?url=${encodeURIComponent('https://api.sleeper.com/stats/nfl/player/'+id+'?season_type=regular&season='+yr+'&grouping=week')}`;
// nflverse via corsproxy.io (allorigins.win is unreliable — CORS 520/522)
const NV_GH_URL = yr=>'https://github.com/nflverse/nflverse-data/releases/download/rosters/roster_'+yr+'.csv';
const NV_CSV_URLS = yr=>[
  // allorigins /get returns JSON wrapper with contents field — handles GitHub redirects
  `https://api.allorigins.win/get?url=${encodeURIComponent(NV_GH_URL(yr))}`,
  // cors.sh follows redirects
  `https://cors.sh/${NV_GH_URL(yr)}`,
  // corsproxy as last resort
  `https://corsproxy.io/?url=${encodeURIComponent(NV_GH_URL(yr))}`,
];
const LEAGUE_ID   = '1265652443362889728';
const LEAGUE_MU   = (lgId,wk)=>`https://api.sleeper.app/v1/league/${lgId}/matchups/${wk}`;
const SL_SCHEDULE = yr=>`https://api.sleeper.app/schedule/nfl/regular/${yr}`;

const CACHE_KEY='mim_sleeper_players',CACHE_TS='mim_sleeper_ts',CACHE_TTL=23*60*60*1000;

const LIGA_SCORING={idp_tkl_solo:1.5,idp_tkl_ast:0.5,idp_sack:4,idp_qb_hit:1,
  idp_tkl_loss:2,idp_pass_def:3,idp_int:6,idp_fum_rec:2,idp_ff:4,idp_td:6,

async function fetchFB(d,p){
  for(const url of [d,p]){
    try{
      const r=await fetch(url,{mode:'cors'});if(!r.ok)continue;
      const t=await r.text();if(!t||t==='null')return null;
      const obj=JSON.parse(t);
      // Accept arrays (Sleeper weekly stats) AND non-empty objects
      if(Array.isArray(obj)&&obj.length>0)return obj;
      if(obj&&typeof obj==='object'&&!Array.isArray(obj)&&Object.keys(obj).length)return obj;
    }catch(e){console.warn('fetchFB',url.slice(0,60),e.message);}
  }
  return null;
}

// ── LEAGUE CHAIN ─────────────────────────────────────────────────────────────
async function buildLeagueChain(){
  leagueChain[CUR_YEAR]=LEAGUE_ID;
  try{
    let lgId=LEAGUE_ID;
    for(let i=0;i<7;i++){
      const r=await fetch(`https://api.sleeper.app/v1/league/${lgId}`);if(!r.ok)break;
      const lg=await r.json();
      const prev=lg.previous_league_id,season=parseInt(lg.season);
      if(prev&&prev!=='0'){leagueChain[season-1]=prev;lgId=prev;}else break;
    }
  }catch(e){console.warn('league chain',e);}
  console.log('[MIM] League chain:',JSON.stringify(leagueChain));
  // Log how many seasons we can scan pts for
  const chainYears=Object.keys(leagueChain).sort();
  console.log(`[MIM] Can scan pts for years: ${chainYears.join(', ')}`);
}

// ── SCHEDULE: build team→week→{opp,home} ─────────────────────────────────────
async function loadSchedule(yr){
  if(schedCache[yr])return schedCache[yr];
  try{
    const r=await fetch(SL_SCHEDULE(yr));if(!r.ok)return null;
    const raw=await r.json();
    // Sleeper schedule response: could be object keyed by game_id, or array
    const games=Array.isArray(raw)?raw:Object.values(raw);
    const map={};
    for(const g of games){
      // Field names vary: home/away or home_team/away_team
      const home=g.home||g.home_team;
      const away=g.away||g.away_team;
      const wk=g.week;
      if(!home||!away||!wk)continue;
      if(!map[home])map[home]={};
      if(!map[away])map[away]={};
      map[home][wk]={opp:away,home:true};
      map[away][wk]={opp:home,home:false};
    }
    schedCache[yr]=map;
    console.log(`[MIM] Schedule ${yr}: ${Object.keys(map).length} teams, sample game:`,games[0]);
    return map;
  }catch(e){console.warn('schedule',yr,e);return null;}
}

// ── NFLVERSE: fetch CSV, extract team/gsis/pff for player ────────────────────
// Uses corsproxy.io — works in both Chrome and Safari
async function nvFetch(p,yr){
  if(nvCache[yr]!==undefined)return nvCache[yr];
  nvCache[yr]=null;
  let text=null;
  for(const url of NV_CSV_URLS(yr)){
    try{
      // 5s timeout per proxy — fail fast instead of waiting for browser timeout
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),5000);
      const r=await fetch(url,{mode:'cors',signal:ctrl.signal});
      clearTimeout(timer);
      if(!r.ok){console.warn(`nflverse ${yr}: HTTP ${r.status} @ ${url.slice(0,60)}`);continue;}
      let t=await r.text();
      // allorigins /get wraps response: {"contents":"...csv..."}
      if(t&&t.startsWith('{')&&t.includes('"contents"')){try{t=JSON.parse(t).contents||'';}catch{}}
      if(t&&t.length>500&&t.includes('sleeper_id')){
        text=t;console.log(`[MIM] nflverse ${yr}: OK via ${url.slice(0,60)}`);break;
      }
      console.warn(`nflverse ${yr}: bad response (len=${t?.length}) @ ${url.slice(0,60)}`);
    }catch(e){console.warn(`nflverse ${yr}: error @ ${url.slice(0,60)}:`,e.message);}
  }
  if(!text){console.warn(`[MIM] nflverse ${yr}: all proxies failed`);return null;}
  try{
    const lines=text.split('\n');if(lines.length<2)return null;
    const H=splitCSV(lines[0]);
    const iSl=H.indexOf('sleeper_id'),iNm=H.indexOf('full_name'),iDb=H.indexOf('birth_date');
    const iTeam=H.indexOf('team'),iGs=H.indexOf('gsis_id'),iPf=H.indexOf('pff_id');
    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const c2=splitCSV(lines[i]);
      if((iSl>=0&&c2[iSl]===p.sleeper_id)||
         (iNm>=0&&(c2[iNm]||'').toLowerCase()===(p.full_name||'').toLowerCase()&&iDb>=0&&p.birth_date&&c2[iDb]===p.birth_date)){
        nvCache[yr]={
          team:(iTeam>=0&&c2[iTeam]&&c2[iTeam]!=='NA')?c2[iTeam]:'',
          gsis_id:(iGs>=0&&c2[iGs]&&c2[iGs]!=='NA')?c2[iGs]:'',
          pff_id:(iPf>=0&&c2[iPf]&&c2[iPf]!=='NA')?c2[iPf]:''
        };
        console.log(`[MIM] nflverse ${yr} found:`,nvCache[yr]);
        return nvCache[yr];
      }
    }
    console.warn(`[MIM] nflverse ${yr}: player not found in CSV`);
  }catch(e){console.warn(`nflverse ${yr} parse:`,e.message);}
  return null;
}

// ── CHECK IF PLAYER IS IN LEAGUE ROSTER ──────────────────────────────────────
// Returns true if player is/was on any roster in this league season
async function isPlayerInLeague(playerId, lgId){
  try{
    const r=await fetch(`https://api.sleeper.app/v1/league/${lgId}/rosters`);
    if(!r.ok)return false;
    const rosters=await r.json();
    for(const roster of rosters){
      const all=[...(roster.players||[]),...(roster.reserve||[]),...(roster.taxi||[])];
      if(all.includes(playerId))return true;
    }
  }catch(e){console.warn('isPlayerInLeague:',e.message);}
  return false;
}

// ── WEEKLY FANTASY POINTS from Matchups ──────────────────────────────────────
// Only call this if player is confirmed in the league
async function fetchWeeklyPtsMatchups(playerId,yr,lgId,maxWk){
  const result={};
  for(let wk=1;wk<=maxWk;wk++){
    try{
      const r=await fetch(LEAGUE_MU(lgId,wk));if(!r.ok)continue;
      const ms=await r.json();
      for(const m of ms){
        const pp=m.players_points||{};
        if(pp[playerId]!==undefined){
          result[wk]=parseFloat(pp[playerId]||0);
          break;
        }
      }
    }catch{}
  }
  return result;
}

// ── SEASON PTS: check roster then scan matchups ───────────────────────────────
async function fetchSeasonPtsForPlayer(playerId, yr, lgId, maxWk){
  // First check if player is even in this league
  const inLeague = await isPlayerInLeague(playerId, lgId);
  console.log(`[MIM] pts ${yr}: player in league = ${inLeague}`);
  if(!inLeague) return null; // Not in league → show "-"
  
  const wkPts = await fetchWeeklyPtsMatchups(playerId, yr, lgId, maxWk);
  const weeksFound = Object.keys(wkPts).length;
  if(weeksFound === 0) return 0; // In league but 0 pts (injured, bench etc)
  
  const total = Object.values(wkPts).reduce((a,b)=>a+b, 0);
  console.log(`[MIM] pts ${yr}: ${total.toFixed(1)} across ${weeksFound} weeks`);
  return total;
}

function splitCSV(l){const c=[];let cur='',q=false;for(const ch of l){if(ch==='"'){q=!q;}else if(ch===','&&!q){c.push(cur.trim());cur='';}else cur+=ch;}c.push(cur.trim());return c;}

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function loadPlayer(){
  if(!TARGET_ID){sub('No player ID');return;}
  sub('Checking cache…');
  let p=null;
  const cached=(()=>{try{const s=store(),ts=s.getItem(CACHE_TS);if(ts&&Date.now()-parseInt(ts)<CACHE_TTL){const r=s.getItem(CACHE_KEY);return r?JSON.parse(r):null;}}catch{}return null;})();
  if(cached){allPlayers=cached;p=cached.find(x=>x.sleeper_id===TARGET_ID);}
  if(!p){
    sub('Fetching Sleeper…');
    try{
      const r=await fetch(SLEEPER_ALL);if(!r.ok)throw new Error('HTTP '+r.status);
      const data=await r.json();
      const DL=new Set(['DE','DT','NT','EDGE','IDL','DL']),LB=new Set(['LB','ILB','MLB','OLB']),DB=new Set(['CB','FS','SS','S','DB','SAF']);
      allPlayers=Object.entries(data).filter(([,x])=>{const pos=(x.position||'').toUpperCase();return DL.has(pos)||LB.has(pos)||DB.has(pos);})
        .map(([id,x])=>({sleeper_id:id,full_name:x.full_name||`${x.first_name||''} ${x.last_name||''}`.trim(),position:idpG(x.position,x.depth_chart_position),team:x.team||'',espn_id:x.espn_id||''}));
      const raw=data[TARGET_ID];if(!raw)throw new Error('Player not found');
      p=buildP(TARGET_ID,raw);
    }catch(e){sub('Error: '+e.message);console.error(e);return;}
  }
  renderPlayer(p);
  // Start league chain + stats loading in parallel, IDs in background
  // enrichIds runs after a short delay so render completes first
  setTimeout(()=>enrichIds(p),200);
  // Build league chain and load stats simultaneously
  // loadAllStats will await leagueChainReady before pts scan
  window._leagueChainReady = buildLeagueChain();
  loadAllStats(p);
}

function buildP(id,r){
  return{sleeper_id:id,gsis_id:r.gsis_id||'',pff_id:'',espn_id:r.espn_id||'',
    full_name:r.full_name||`${r.first_name||''} ${r.last_name||''}`.trim(),
    first_name:r.first_name||'',last_name:r.last_name||'',
    position:idpG(r.position,r.depth_chart_position),detail_pos:r.depth_chart_position||r.position||'',
    team:r.team||'',status:r.status||'',injury:r.injury_status||'',
    number:r.number||'',age:r.age||'',height:r.height||'',weight:r.weight||'',
    college:r.college||'',years_exp:r.years_exp??'',
    entry_year:r.years_exp!=null?(CUR_YEAR-r.years_exp):'',birth_date:r.birth_date||'',
    draft_number:r.metadata?.draft_number||r.draft_number||'',
    draft_round:r.metadata?.draft_round||r.draft_round||'',
    draft_club:r.metadata?.draft_club||r.draft_club||'',
    gsis_src:'Sleeper',pff_src:'Sleeper',headshot_url:r.metadata?.headshot_url||''};
}

async function enrichIds(p){
  for(const yr of [CUR_YEAR,CUR_YEAR-1,CUR_YEAR-2]){
    const nv=await nvFetch(p,yr);
    if(nv){
      let upd=false;
      if(nv.gsis_id&&nv.gsis_id!=='NA'&&!p.gsis_id){p.gsis_id=nv.gsis_id;p.gsis_src=`nflverse ${yr}`;upd=true;}
      if(nv.pff_id&&nv.pff_id!=='NA'&&!p.pff_id){p.pff_id=nv.pff_id;p.pff_src=`nflverse ${yr}`;upd=true;}
      if(upd)renderIds(p);
      if(p.gsis_id&&p.pff_id)break;
    }
  }
}

  // Headshot: Sleeper CDN works in Safari. Chrome blocks it sometimes due to CORS.
  // Use a corsproxy wrapper for Chrome compatibility, direct URL for Safari.
  // We try 3 sources in order with a clean sequential fallback.
  // Start img hidden — only reveal on successful load
  hsEl.style.display='none';
  fbEl.style.display='flex'; // show initials while loading
  const _hsUrls=[
    `https://sleepercdn.com/content/nfl/players/${p.sleeper_id}.jpg`,
    p.espn_id?`https://a.espncdn.com/i/nfl/players/full/${p.espn_id}.png`:'',

    else{hsEl.style.display='none';fbEl.style.display='flex';}
  };
  hsEl.onload=function(){
    hsEl.style.display='block';
    fbEl.style.display='none';
  };
  if(_hsUrls.length)hsEl.src=_hsUrls[0];
  else{hsEl.style.display='none';fbEl.style.display='flex';}

  else if(p.injury)sBadge=`<span class="badge binj">${p.injury}</span>`;
  else if(p.status)sBadge=`<span class="badge bother">${p.status}</span>`;
  document.getElementById('ph-badges').innerHTML=`<span class="badge bp">${p.position}${detail}</span><span class="badge ${p.team?'bt':'bfa'}">${p.team||'FA'}</span>${sBadge}${p.number?`<span class="badge bnum">#${p.number}</span>`:''}`;

  document.getElementById('ph-sub-team').textContent=tn(p.team);
  document.getElementById('v-ht').textContent=fmtH(p.height);

  document.getElementById('v-ag').textContent=p.age||'–';
  document.getElementById('v-ex').textContent=p.years_exp!==''?`${p.years_exp}Y`:'–';
  document.getElementById('cs-title').textContent=`${CUR_YEAR} Stats`;
  document.getElementById('ph-extra').innerHTML=[
    p.birth_date?`<span class="ph-ei"><strong>Born:</strong> ${p.birth_date}</span>`:'',
    p.college?`<span class="ph-ei"><strong>College:</strong> ${p.college}</span>`:'',
    p.entry_year?`<span class="ph-ei"><strong>NFL Entry:</strong> ${p.entry_year}</span>`:'',
    (p.draft_club&&p.draft_number)?`<span class="ph-ei"><strong>Drafted:</strong> ${p.draft_club} · Rd ${p.draft_round||'?'} · Pick #${p.draft_number}</span>`:'',
  ].filter(Boolean).join('');
  const startYr=parseInt(p.entry_year)||CUR_YEAR;
  const seasons=[];for(let y=CUR_YEAR;y>=startYr;y--)seasons.push(y);
  window._P=p;window._S=seasons;window._teamMap={};
  document.getElementById('hist-badge').textContent=`${seasons.length} Season${seasons.length!==1?'s':''}`;
  renderHistRows(seasons,p,{},{},{});

}

// ── CAREER HIGH ───────────────────────────────────────────────────────────────
function calcHighs(statsMap){
  const ks=['gp','def_snp','idp_tkl_solo','idp_tkl_ast','idp_tkl','idp_tkl_loss','idp_sack','idp_qb_hit','idp_pass_def','idp_int','def_int','idp_fum_rec','idp_ff','def_ff','idp_safe','idp_td','def_td'];
  const h={};
  for(const s of Object.values(statsMap)){for(const k of ks){const v=getStat(s,k);if(v!==null&&(h[k]===undefined||v>h[k]))h[k]=v;}}
  return h;
}

// ── HISTORY TABLE ─────────────────────────────────────────────────────────────
function renderHistRows(seasons,p,statsMap,ptsMap,teamMap){
  const detail=p.detail_pos&&p.detail_pos!==p.position?` · ${p.detail_pos}`:'';
  const highs=calcHighs(statsMap);
  function isCH(val,...keys){if(!val||val===0)return false;for(const k of keys){const h=highs[k];if(h!==undefined&&val>=h&&val>0)return true;}return false;}
  let html='';
  for(const yr of seasons){
    const isCur=yr===CUR_YEAR;
    const s=statsMap[yr]||{};
    const pts=ptsMap[yr]??null;
    const teamDisp=isCur?(p.team||'FA'):(teamMap[yr]||null);
    const teamLabel=teamDisp||'–';
    const logo=teamDisp?`<img class="tl" src="${logoUrl(teamDisp)}" alt="" onerror="this.style.display='none'">`:' ';
    const gp=getStat(s,'gp'),snaps=getStat(s,'def_snp');
    const solo=getStat(s,'idp_tkl_solo'),ast=getStat(s,'idp_tkl_ast');
    let tkl=getStat(s,'idp_tkl');if(tkl===null&&solo!==null&&ast!==null)tkl=solo+ast;
    const tfl=getStat(s,'idp_tkl_loss'),sk=getStat(s,'idp_sack');
    const qbh=getStat(s,'idp_qb_hit');
    const pbu=getStat(s,'idp_pass_def');
    const intt=getStat(s,'idp_int','def_int'),ff=getStat(s,'idp_ff','def_ff'),td=getStat(s,'idp_td','def_td');
    const ptsCell=pts!==null?`<td class="sv pts">${parseFloat(pts).toFixed(1)}</td>`:`<td class="sv z">–</td>`;
    // Avg pts per game
    const avgPts=(pts!==null&&gp&&gp>0)?(parseFloat(pts)/gp).toFixed(1):null;
    const avgCell=avgPts!==null?`<td class="sv" style="color:var(--muted2);font-size:15px">${avgPts}</td>`:`<td class="sv z">–</td>`;
    html+=`<tr class="season-row${isCur?' cur':''}" onclick="toggleWeekly(${yr})">
      <td class="yr"><span class="expand-arrow" id="arrow-${yr}">▶</span>${yr}${isCur?`<span class="now-badge">NOW</span>`:''}</td>
      <td><div class="team-cell">${logo}<span style="font-size:15px;font-weight:500">${teamLabel}</span></div></td>
      <td><span class="badge bp" style="font-size:10px">${p.position}${detail}</span></td>
      ${avgCell}${ptsCell}
      ${sc(gp,isCH(gp,'gp'))}${sc(snaps,isCH(snaps,'def_snp'))}
      ${sc(solo,isCH(solo,'idp_tkl_solo'))}${sc(ast,isCH(ast,'idp_tkl_ast'))}${sc(tkl,isCH(tkl,'idp_tkl'))}
      ${sc(tfl,isCH(tfl,'idp_tkl_loss'))}${sc(sk,isCH(sk,'idp_sack'))}
      ${sc(qbh,isCH(qbh,'idp_qb_hit'))}${sc(pbu,isCH(pbu,'idp_pass_def'))}
      ${sc(intt,isCH(intt,'idp_int','def_int'))}
      ${sc(getStat(s,'idp_fum_rec'),isCH(getStat(s,'idp_fum_rec'),'idp_fum_rec'))}
      ${sc(ff,isCH(ff,'idp_ff','def_ff'))}
      ${sc(getStat(s,'idp_safe'),isCH(getStat(s,'idp_safe'),'idp_safe'))}
      ${sc(td,isCH(td,'idp_td','def_td'))}
    </tr>
    <tr class="weekly-row" id="weekly-${yr}">
      <td colspan="20" style="padding:0">
        <div class="weekly-table-wrap">
          <div class="weekly-loading" id="wl-${yr}">Loading…</div>
          <table class="weekly-table" id="wt-${yr}" style="display:none">
            <thead><tr>
              <th style="width:110px">Week</th><th style="width:165px">Opponent</th>
              <th style="width:60px">Pts</th><th style="width:45px">GP</th><th style="width:65px">Snp%</th><th style="width:60px">Snaps</th>
              <th style="width:55px">Solo</th><th style="width:55px">Ast</th><th style="width:55px">TKL</th>
              <th style="width:55px">TFL</th><th style="width:55px">SK</th><th style="width:60px">QBH</th><th style="width:60px">PBU</th>
              <th style="width:55px">INT</th><th style="width:50px">FR</th><th style="width:50px">FF</th><th style="width:55px">Safe</th><th style="width:50px">TD</th>
            </tr></thead>
            <tbody id="wb-${yr}"></tbody>
          </table>
        </div>
      </td>
    </tr>`;
  }
  document.getElementById('hist-body').innerHTML=html;
}

// ── TOGGLE WEEKLY ─────────────────────────────────────────────────────────────
async function toggleWeekly(yr){
  const row=document.getElementById(`weekly-${yr}`);
  const arrow=document.getElementById(`arrow-${yr}`);
  const isOpen=row.classList.contains('open');
  document.querySelectorAll('.weekly-row.open').forEach(r=>r.classList.remove('open'));
  document.querySelectorAll('.expand-arrow.open').forEach(a=>a.classList.remove('open'));
  if(isOpen)return;
  row.classList.add('open');arrow.classList.add('open');
  if(weeklyLoaded[yr])return;
  weeklyLoaded[yr]=true;

  const p=window._P;
  const loadEl=document.getElementById(`wl-${yr}`);
  const tableEl=document.getElementById(`wt-${yr}`);
  const bodyEl=document.getElementById(`wb-${yr}`);
  loadEl.textContent='Loading weekly data…';

  try{
    const stR=await fetch('https://api.sleeper.app/v1/state/nfl');
    const st=await stR.json();
    const maxWk=yr<CUR_YEAR?18:Math.min(st.week||1,st.display_week||1,18);
    const lgId=leagueChain[yr]||null;

    // Get player team for this year
    // Current year: from Sleeper player object
    // Past years: try nvCache first (may be populated by enrichTeams), then ESPN API
    let playerTeam='';
    if(yr===CUR_YEAR){
      playerTeam=p.team||'';
    } else if(nvCache[yr]?.team){
      playerTeam=nvCache[yr].team;
    } else if(window._teamMap&&window._teamMap[yr]){
      playerTeam=window._teamMap[yr];
    }
    // teamMap is set by enrichTeams running in background
    // If still empty, weekly stats will show without opponent (stats still visible)
    console.log(`[MIM] toggleWeekly ${yr}: team="${playerTeam}"`);

    // Load weekly stats + schedule in parallel
    const [wData, scheduleRaw] = await Promise.all([
      fetchFB(SL_W_D(p.sleeper_id,yr), SL_W_P(p.sleeper_id,yr)),
      loadSchedule(yr)
    ]);
    // loadSchedule returns {teamAbbr: {wk: {opp,home}}} or null
    // Extract just this player's team schedule: {wk: {opp, home}}
    const schedule = (scheduleRaw && playerTeam && scheduleRaw[playerTeam]) ? scheduleRaw[playerTeam] : {};
    const wkPts = {};
    console.log(`[MIM] Weekly ${yr}: wData=${!!wData}, schedule weeks for ${playerTeam}=${Object.keys(schedule).length}`);
    if(scheduleRaw && Object.keys(scheduleRaw).length === 0)
      console.log(`[MIM] Schedule ${yr}: empty — Sleeper may not have this year`);

    // Sleeper weekly grouping=week returns:
    // { "1": {status, date, stats: {def_snp:30, idp_tkl:1, ...}}, "2": {...}, ... }
    // Keys are week numbers as strings, stats are nested under .stats
    let weeks=[];
    if(wData && typeof wData==='object' && !Array.isArray(wData)){
      weeks = Object.entries(wData)
        .filter(([k,v]) => !isNaN(parseInt(k)) && v && typeof v==='object')
        .map(([k,v]) => ({
          week: parseInt(k),
          // Merge nested stats up to week level for easy access
          ...(v.stats||v),
          // Keep top-level date too
          _date: v.date||null
        }));
    } else if(Array.isArray(wData)){
      // Already flat array format
      weeks = wData.map(w => ({...( w.stats ? {...w, ...w.stats} : w)}));
    }
    console.log(`[MIM] Weekly ${yr}: ${weeks.length} weeks parsed`);
    if(weeks.length>0) console.log(`[MIM] Wk1 stats:`, JSON.stringify(weeks[0]).slice(0,300));

    if(!weeks.length){loadEl.textContent='No game data for this season.';return;}
    weeks.sort((a,b)=>(parseInt(a.week)||0)-(parseInt(b.week)||0));

    // Per-category highs across all weeks → highlight best game per stat
    const weekHighs={};
    for(const [cat,key] of [['snaps','def_snp'],['solo','idp_tkl_solo'],['ast','idp_tkl_ast'],
      ['tkl','idp_tkl'],['tfl','idp_tkl_loss'],['sk','idp_sack'],['qbh','idp_qb_hit'],
      ['pbu','idp_pass_def'],['int','idp_int'],['fr','idp_fum_rec'],
      ['ff','idp_ff'],['safe','idp_safe'],['td','idp_td']]){
      const vals=weeks.map(w=>getStat(w,key)??0).filter(v=>v>0);
      if(vals.length) weekHighs[cat]=Math.max(...vals);
    }

    let rowHtml='';
    for(const w of weeks){
      const wk=parseInt(w.week)||0;
      // Fantasy pts: from matchup scan
      // Only show pts from matchup scan (league scoring) — pts_idp is Sleeper default, wrong values
      const pts=wkPts[wk]!==undefined?wkPts[wk]:null;
      const ptsIdp=null; // intentionally disabled — use matchup scan only

      // Opponent from schedule — already filtered for playerTeam
      let oppHtml='–';
      if(schedule&&schedule[wk]){
        const g=schedule[wk];
        const opp=g.opp||'';
        const isHome=g.home;
        if(opp){
          const oppLogo=`<img class="tl" src="${logoUrl(opp)}" alt="" onerror="this.style.display='none'">`;
          oppHtml=`<div class="team-cell">${oppLogo}<span style="font-size:13px">${isHome?'':'@ '}<b>${opp}</b></span></div>`;
        }
      }

      // Only calculate pts if player was active this week
      const gpWk=getStat(w,'gp')||getStat(w,'gms_active')||0;
      const ptsCalcWk=gpWk>0?calcPts(w):0;
      const ptsDisplay=ptsCalcWk>0?ptsCalcWk.toFixed(1):'–';
      const solo=getStat(w,'idp_tkl_solo'),ast=getStat(w,'idp_tkl_ast');
      let tkl=getStat(w,'idp_tkl');if(tkl===null&&solo!==null&&ast!==null)tkl=solo+ast;

      rowHtml+=`<tr>
        <td class="wk-yr">Wk ${wk}</td>
        <td>${oppHtml}</td>
        <td class="wk-pts">${ptsDisplay}</td>
        <td class="sv z">–</td>
        ${wcSnp(getStat(w,'def_snp'),getStat(w,'tm_def_snp'))}
        ${wcH(getStat(w,'def_snp'),weekHighs.snaps)}${wcH(solo,weekHighs.solo)}${wcH(ast,weekHighs.ast)}${wcH(tkl,weekHighs.tkl)}
        ${wcH(getStat(w,'idp_tkl_loss'),weekHighs.tfl)}${wcH(getStat(w,'idp_sack'),weekHighs.sk)}
        ${wcH(getStat(w,'idp_qb_hit'),weekHighs.qbh)}${wcH(getStat(w,'idp_pass_def'),weekHighs.pbu)}
        ${wcH(getStat(w,'idp_int','def_int'),weekHighs.int)}
        ${wcH(getStat(w,'idp_fum_rec'),weekHighs.fr)}
        ${wcH(getStat(w,'idp_ff','def_ff'),weekHighs.ff)}
        ${wcH(getStat(w,'idp_safe'),weekHighs.safe)}
        ${wcH(getStat(w,'idp_td','def_td'),weekHighs.td)}
      </tr>`;
    }
    bodyEl.innerHTML=rowHtml||'<tr><td colspan="14" style="text-align:center;padding:16px;color:var(--muted)">No data</td></tr>';
    loadEl.style.display='none';tableEl.style.display='table';
  }catch(e){
    console.error('weekly',e);
    loadEl.textContent='Error loading.';
  }
}

// ── LOAD ALL STATS ────────────────────────────────────────────────────────────
async function loadAllStats(p){
  const seasons=window._S||[];
  const statsMap={},ptsMap={},teamMap={};
  const cum={gp:0,snaps:0,solo:0,ast:0,tkl:0,tfl:0,sk:0,qbh:0,pbu:0,int:0,fr:0,ff:0,safe:0,td:0};
  let anyStats=false;

  // Fetch NFL state + all season stats in parallel (nflverse runs separately in background)
  sub('Loading stats…');
  const [stateRes, ...seasonResults] = await Promise.all([
    fetch('https://api.sleeper.app/v1/state/nfl').then(r=>r.json()).catch(()=>({week:1,display_week:1})),
    ...seasons.filter(yr=>yr<=CUR_YEAR).map(yr=>Promise.all([
      fetchFB(SL_S_D(p.sleeper_id,yr),SL_S_P(p.sleeper_id,yr)),
      Promise.resolve(yr)
    ]))
  ]);
  const stateWk=Math.min(stateRes.week||1,stateRes.display_week||1,18);
  // Current year team always known from Sleeper
  teamMap[CUR_YEAR]=p.team||'';
  if(!window._teamMap)window._teamMap={};
  window._teamMap[CUR_YEAR]=p.team||'';

  for(const [data,yr] of seasonResults){
    try{

      if(!data)continue;
      const s=data.stats||data;
      if(!s||!Object.keys(s).length)continue;

      // Log all keys + pts fields on first hit
      if(!anyStats){
        console.log(`[MIM] ${yr} keys:`,Object.keys(s).sort().join(', '));
        const ptsFields=Object.entries(s).filter(([k])=>k.startsWith('pts')||k.includes('fpts')||k.includes('point'));
        console.log(`[MIM] ${yr} pts fields:`,Object.fromEntries(ptsFields));
        console.log(`[MIM] ${yr} IDP:`,{gp:s.gp,def_snp:s.def_snp,idp_tkl:s.idp_tkl,idp_tkl_solo:s.idp_tkl_solo,idp_tkl_loss:s.idp_tkl_loss,idp_sack:s.idp_sack,idp_qb_hit:s.idp_qb_hit,idp_pass_def:s.idp_pass_def,idp_int:s.idp_int,idp_ff:s.idp_ff,pts_idp:s.pts_idp,pts_std:s.pts_std,pts_ppr:s.pts_ppr});
      }

      // Calculate pts using league scoring — only if player actually played
      const gpVal=getStat(s,'gp')||0;
      if(gpVal<=0){
        console.log(`[MIM] pts ${yr}: skipped, gp=${gpVal}`);
      } else {
        const ptsCalc=calcPts(s);
        if(ptsCalc>0){
          ptsMap[yr]=ptsCalc;
          console.log(`[MIM] pts ${yr} (calculated, ${gpVal} games): ${ptsCalc.toFixed(1)}`);
        }
      }

      statsMap[yr]=s;anyStats=true;
      const g=(a,...ks)=>getStat(a,...ks)||0;
      cum.gp   +=g(s,'gp');cum.snaps+=g(s,'def_snp');
      cum.solo +=g(s,'idp_tkl_solo');cum.ast+=g(s,'idp_tkl_ast');
      cum.tkl  +=(g(s,'idp_tkl')||(g(s,'idp_tkl_solo')+g(s,'idp_tkl_ast')));
      cum.tfl  +=g(s,'idp_tkl_loss');cum.sk+=g(s,'idp_sack');
      cum.qbh  +=g(s,'idp_qb_hit');cum.pbu+=g(s,'idp_pass_def');
      cum.int  +=g(s,'idp_int','def_int');cum.fr+=g(s,'idp_fum_rec');
      cum.ff   +=g(s,'idp_ff','def_ff');cum.safe+=g(s,'idp_safe');
      cum.td   +=g(s,'idp_td','def_td');
    }catch(e){console.warn(`Stats ${yr}:`,e);}
  }

  // Fantasy points: ALWAYS from matchup scan (league-specific custom scoring)
  sub('Loading fantasy points…');
  // Ensure league chain is fully built before scanning
  if(window._leagueChainReady) await window._leagueChainReady;
  // If chain only has current year, try building again (may have failed silently)
  if(Object.keys(leagueChain).length<=1){
    console.warn('[MIM] League chain incomplete, retrying buildLeagueChain...');
    await buildLeagueChain();
  }
  const ptsSeasonsToScan=seasons.filter(yr=>yr<=CUR_YEAR&&leagueChain[yr]);
  console.log(`[MIM] Pts scan: ${ptsSeasonsToScan.length} seasons:`, ptsSeasonsToScan.join(', '));
  await Promise.all(ptsSeasonsToScan.map(async yr=>{
    const lgId=leagueChain[yr];
    const maxWk=yr<CUR_YEAR?18:stateWk;
    const total=await fetchSeasonPtsForPlayer(p.sleeper_id,yr,lgId,maxWk);
    if(total!==null) ptsMap[yr]=total; // null = not in league, undefined key = show "-"
  }));

  // Current season card
  const csWrap=document.getElementById('cs-wrap'),csBadge=document.getElementById('cs-badge');
  const curS=statsMap[CUR_YEAR];
  if(curS&&Object.keys(curS).length){
    csBadge.textContent='Season';csBadge.className='sec-badge live';
    const defs=[
      {l:'Fantasy Pts',v:ptsMap[CUR_YEAR]},
      {l:'GP',v:getStat(curS,'gp')},{l:'Def Snaps',v:getStat(curS,'def_snp')},
      {l:'Solo Tkl',v:getStat(curS,'idp_tkl_solo')},{l:'Ast Tkl',v:getStat(curS,'idp_tkl_ast')},
      {l:'Total Tkl',v:getStat(curS,'idp_tkl')},{l:'TFL',v:getStat(curS,'idp_tkl_loss')},
      {l:'Sacks',v:getStat(curS,'idp_sack')},{l:'QBH',v:getStat(curS,'idp_qb_hit')},
      {l:'PBU',v:getStat(curS,'idp_pass_def')},{l:'INT',v:getStat(curS,'idp_int','def_int')},
      {l:'FF',v:getStat(curS,'idp_ff','def_ff')},{l:'TD',v:getStat(curS,'idp_td','def_td')},
    ].filter(d=>d.v!==null&&d.v!==undefined);
    csWrap.innerHTML=defs.length
      ?`<div class="cur-grid">${defs.map(d=>{const n=parseFloat(d.v);return`<div class="cstat"><div class="cstat-val">${n%1===0?n:n.toFixed(1)}</div><div class="cstat-lbl">${d.l}</div></div>`;}).join('')}</div>`
      :`<div class="stats-ph"><p>No stats recorded yet for ${CUR_YEAR}.</p></div>`;
  }else{
    csBadge.textContent='Pending';csBadge.className='sec-badge pending';
    csWrap.innerHTML=`<div class="stats-ph"><p>No stats available for ${CUR_YEAR} yet.</p></div>`;
  }

  // Career bar
  if(anyStats){
    const cumBar=document.getElementById('cum-bar');cumBar.style.display='flex';
    const fmt=v=>v%1===0?v:v.toFixed(1);
    const totalPts=Object.values(ptsMap).reduce((a,b)=>a+b,0);
    cumBar.innerHTML=[
      {l:'Fantasy Pts',v:totalPts>0?totalPts.toFixed(1):'–'},
      {l:'Career GP',v:fmt(cum.gp)},{l:'Snaps',v:fmt(cum.snaps)},
      {l:'Solo',v:fmt(cum.solo)},{l:'Ast',v:fmt(cum.ast)},{l:'TKL',v:fmt(cum.tkl)},
      {l:'TFL',v:fmt(cum.tfl)},{l:'Sacks',v:fmt(cum.sk)},{l:'QBH',v:fmt(cum.qbh)},
      {l:'PBU',v:fmt(cum.pbu)},{l:'INT',v:fmt(cum.int)},{l:'FR',v:fmt(cum.fr)},{l:'FF',v:fmt(cum.ff)},{l:'Safe',v:fmt(cum.safe)},{l:'TD',v:fmt(cum.td)},
    ].map(s=>`<div class="cum-s"><div class="cum-v">${s.v}</div><div class="cum-l">${s.l}</div></div>`).join('');
  }

  renderHistRows(window._S,p,statsMap,ptsMap,teamMap);
  document.getElementById('hist-note').textContent=
    anyStats?'Stats + Pts via Sleeper · Career highs in orange · Click row for weekly breakdown'
            :'Stats pending · Click a row to expand weekly';
  sub('Done');
  // Fill in past team names in background without blocking stats display
  enrichTeams(p,seasons,statsMap,ptsMap,teamMap);
}

// Background: get past team from Sleeper weekly stats (team field on week objects)
// Falls back to nflverse if Sleeper doesn't return a team field
async function enrichTeams(p,seasons,statsMap,ptsMap,teamMap){
  for(const yr of seasons){
    if(yr>=CUR_YEAR)continue;
    if(teamMap[yr])continue;

    // Try Sleeper weekly stats first — fast, no proxy needed
    let team='';
    try{
      const wData=await fetchFB(SL_W_D(p.sleeper_id,yr),SL_W_P(p.sleeper_id,yr));
      if(wData){
        // weekly grouping returns array of week objects, each may have 'team'
        const raw=wData.stats||wData;
        const weeks=Array.isArray(raw)?raw:Object.values(raw).filter(v=>v&&typeof v==='object');
        for(const w of weeks){
          // Sleeper weekly stat objects have a 'team' field
          if(w.team&&typeof w.team==='string'&&w.team.length===2||w.team?.length===3){
            team=w.team;break;
          }
        }
        // Also check top-level team field
        if(!team&&wData.team)team=wData.team;
      }
    }catch(e){console.warn(`enrichTeams ${yr} Sleeper:`,e.message);}

    // Fallback: nflverse CSV
    if(!team){
      const nv=await nvFetch(p,yr);
      if(nv?.team)team=nv.team;
    }

      // Show FA if nflverse couldn't find team either
    teamMap[yr]=team||'FA';
    if(!window._teamMap)window._teamMap={};
    window._teamMap[yr]=team||'FA';
    updateTeamCell(yr,team||'FA');
  }
}

// Update a single team cell in the history table without full re-render
function updateTeamCell(yr,team){
  const row=document.querySelector(`#hist-body tr[onclick="toggleWeekly(${yr})"]`);
  if(!row)return;
  const cell=row.querySelector('td:nth-child(2)');
  if(!cell)return;
  const logo=`<img class="tl" src="${logoUrl(team)}" alt="" onerror="this.style.display='none'">`;
  cell.innerHTML=`<div class="team-cell">${logo}<span style="font-size:15px;font-weight:500">${team}</span></div>`;
}

function renderIds(p){
  document.getElementById('id-grid').innerHTML=[
    {l:'Sleeper ID',v:p.sleeper_id,s:'Sleeper'},
    {l:'GSIS ID',v:p.gsis_id,s:p.gsis_src},
    {l:'PFF ID',v:p.pff_id,s:p.pff_src},
    {l:'ESPN ID',v:p.espn_id,s:'Sleeper'},
  ].map(d=>`<div class="id-box">
    <div class="id-lbl">${d.l}</div>
    <div class="id-val ${d.v?'':'mt'}">${d.v||'Not available'}</div>
    ${d.v?`<div class="id-src">Source: ${d.s}</div>`:''}
  </div>`).join('');
}
