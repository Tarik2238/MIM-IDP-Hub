name: Precompute Team Stats & Lineup Details

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Saison-Jahr (leer lassen für aktuelle Saison)'
        required: false
        default: ''

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: scripts
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Precompute-Skript ausführen
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node precompute.js ${{ github.event.inputs.year }}
