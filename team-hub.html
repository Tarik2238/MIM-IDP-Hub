<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Hub · Mics in Motion</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c10;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2128;
  --border:#21262d;--border2:#30363d;
  --text:#e6edf3;--muted:#7d8590;--muted2:#9198a1;
  --orange:#C4722A;--orange-dim:#7a4419;--orange-glow:rgba(196,114,42,.15);
  --red:#da3633;--green-light:#2ea043;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

nav{background:rgba(13,17,23,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#fff;text-decoration:none;display:flex;align-items:center;gap:10px;}
.brand-logo{width:32px;height:32px;display:block;}
.brand em{color:var(--orange);font-style:normal;}
.nav-mid{display:flex;gap:4px;min-width:0;}
.nav-link{font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .15s;}
.nav-link:hover{color:var(--text);background:var(--bg3);}
.nav-link.active{color:var(--orange);background:var(--orange-glow);}
.auth-wrap{display:flex;align-items:center;gap:10px;}

.toolbar{padding:20px 32px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:28px;flex-wrap:wrap;}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:#fff;}
.tb-title span{color:var(--orange);}
.tb-group{display:flex;flex-direction:column;gap:6px;}
.tb-group label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.conf-tabs{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:3px;}
.conf-tab{background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;padding:7px 16px;border-radius:6px;cursor:pointer;transition:all .15s;}
.conf-tab:hover{color:var(--text);}
.conf-tab.active{background:var(--orange);color:#fff;}

.grid-wrap{padding:28px 32px 60px;}
.team-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;max-width:1400px;margin:0 auto;}
@media(max-width:1100px){ .team-grid{grid-template-columns:repeat(2,1fr);} }
@media(max-width:600px){ .team-grid{grid-template-columns:1fr;} }

.division-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.division-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:#fff;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.division-teams{display:flex;flex-direction:column;gap:8px;}
.mini-team-card{position:relative;display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--bg2);padding:8px 10px;min-height:52px;transition:all .15s;}
.mini-team-card:hover{transform:translateX(2px);border-color:var(--tc-color, var(--orange));}
.mini-team-tint{position:absolute;inset:0;background:var(--tc-color, var(--orange));opacity:.10;pointer-events:none;}
.mini-team-logo-bg{position:absolute;right:-10px;bottom:-10px;width:58px;height:58px;object-fit:contain;opacity:.28;pointer-events:none;filter:saturate(1.15);}
.mini-team-logo{width:30px;height:30px;object-fit:contain;flex-shrink:0;position:relative;z-index:1;}
.mini-team-name{position:relative;z-index:1;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.5px;color:#fff;line-height:1.15;}
.mini-team-city{position:relative;z-index:1;font-size:10px;color:var(--muted2);margin-top:1px;}

@media(max-width:700px){
  nav{padding:0 20px;} .toolbar,.grid-wrap{padding-left:20px;padding-right:20px;}
  .nav-mid{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .nav-mid::-webkit-scrollbar{display:none;}
  .nav-link{white-space:nowrap;flex-shrink:0;font-size:12px;padding:6px 9px;}
  .brand{font-size:18px;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="brand">MICS IN <em>MOTION</em></a>
  <div class="nav-mid">
    <a href="index.html" class="nav-link">Home</a>
    <a href="players.html" class="nav-link">Player DB</a>
    <a href="team-hub.html" class="nav-link active">Team Hub</a>
    <a href="rankings.html" class="nav-link">IDP Rankings</a>
  </div>
</nav>

<div class="toolbar">
  <div class="tb-title">TEAM <span>HUB</span></div>
  <div class="tb-group">
    <label>Conference</label>
    <div class="conf-tabs" id="conf-tabs">
      <button class="conf-tab active" data-conf="">Alle</button>
      <button class="conf-tab" data-conf="AFC">AFC</button>
      <button class="conf-tab" data-conf="NFC">NFC</button>
    </div>
  </div>
</div>

<div class="grid-wrap">
  <div class="team-grid" id="team-grid"></div>
</div>

<script type="module">
const ESPN_A = {ARI:'ari',ATL:'atl',BAL:'bal',BUF:'buf',CAR:'car',CHI:'chi',CIN:'cin',CLE:'cle',DAL:'dal',DEN:'den',DET:'det',GB:'gb',HOU:'hou',IND:'ind',JAX:'jax',KC:'kc',LAC:'lac',LAR:'lar',LV:'lv',MIA:'mia',MIN:'min',NE:'ne',NO:'no',NYG:'nyg',NYJ:'nyj',PHI:'phi',PIT:'pit',SF:'sf',SEA:'sea',TB:'tb',TEN:'ten',WAS:'wsh'};
function logoUrl(abbr){ return `https://a.espncdn.com/i/teamlogos/nfl/500/${ESPN_A[abbr]}.png`; }

const TEAMS = [
  {abbr:'BUF',city:'Buffalo',name:'Bills',conf:'AFC',div:'East',color:'#00338D'},
  {abbr:'MIA',city:'Miami',name:'Dolphins',conf:'AFC',div:'East',color:'#008E97'},
  {abbr:'NE',city:'New England',name:'Patriots',conf:'AFC',div:'East',color:'#C60C30'},
  {abbr:'NYJ',city:'New York',name:'Jets',conf:'AFC',div:'East',color:'#125740'},
  {abbr:'BAL',city:'Baltimore',name:'Ravens',conf:'AFC',div:'North',color:'#241773'},
  {abbr:'CIN',city:'Cincinnati',name:'Bengals',conf:'AFC',div:'North',color:'#FB4F14'},
  {abbr:'CLE',city:'Cleveland',name:'Browns',conf:'AFC',div:'North',color:'#FF3C00'},
  {abbr:'PIT',city:'Pittsburgh',name:'Steelers',conf:'AFC',div:'North',color:'#FFB612'},
  {abbr:'HOU',city:'Houston',name:'Texans',conf:'AFC',div:'South',color:'#A71930'},
  {abbr:'IND',city:'Indianapolis',name:'Colts',conf:'AFC',div:'South',color:'#002C5F'},
  {abbr:'JAX',city:'Jacksonville',name:'Jaguars',conf:'AFC',div:'South',color:'#D7A22A'},
  {abbr:'TEN',city:'Tennessee',name:'Titans',conf:'AFC',div:'South',color:'#4B92DB'},
  {abbr:'DEN',city:'Denver',name:'Broncos',conf:'AFC',div:'West',color:'#FB4F14'},
  {abbr:'KC',city:'Kansas City',name:'Chiefs',conf:'AFC',div:'West',color:'#E31837'},
  {abbr:'LV',city:'Las Vegas',name:'Raiders',conf:'AFC',div:'West',color:'#A5ACAF'},
  {abbr:'LAC',city:'Los Angeles',name:'Chargers',conf:'AFC',div:'West',color:'#0080C6'},
  {abbr:'DAL',city:'Dallas',name:'Cowboys',conf:'NFC',div:'East',color:'#869397'},
  {abbr:'NYG',city:'New York',name:'Giants',conf:'NFC',div:'East',color:'#0B2265'},
  {abbr:'PHI',city:'Philadelphia',name:'Eagles',conf:'NFC',div:'East',color:'#004C54'},
  {abbr:'WAS',city:'Washington',name:'Commanders',conf:'NFC',div:'East',color:'#FFB612'},
  {abbr:'CHI',city:'Chicago',name:'Bears',conf:'NFC',div:'North',color:'#C83803'},
  {abbr:'DET',city:'Detroit',name:'Lions',conf:'NFC',div:'North',color:'#0076B6'},
  {abbr:'GB',city:'Green Bay',name:'Packers',conf:'NFC',div:'North',color:'#FFB612'},
  {abbr:'MIN',city:'Minnesota',name:'Vikings',conf:'NFC',div:'North',color:'#4F2683'},
  {abbr:'ATL',city:'Atlanta',name:'Falcons',conf:'NFC',div:'South',color:'#A71930'},
  {abbr:'CAR',city:'Carolina',name:'Panthers',conf:'NFC',div:'South',color:'#0085CA'},
  {abbr:'NO',city:'New Orleans',name:'Saints',conf:'NFC',div:'South',color:'#D3BC8D'},
  {abbr:'TB',city:'Tampa Bay',name:'Buccaneers',conf:'NFC',div:'South',color:'#D50A0A'},
  {abbr:'ARI',city:'Arizona',name:'Cardinals',conf:'NFC',div:'West',color:'#97233F'},
  {abbr:'LAR',city:'Los Angeles',name:'Rams',conf:'NFC',div:'West',color:'#003594'},
  {abbr:'SF',city:'San Francisco',name:'49ers',conf:'NFC',div:'West',color:'#AA0000'},
  {abbr:'SEA',city:'Seattle',name:'Seahawks',conf:'NFC',div:'West',color:'#69BE28'},
];

const DIVISIONS = ['East','North','South','West'];

function renderTeams(conf){
  const grid = document.getElementById('team-grid');
  const confs = conf ? [conf] : ['AFC', 'NFC'];
  const blocks = [];
  confs.forEach(c => {
    DIVISIONS.forEach(d => blocks.push({ conf: c, div: d, teams: TEAMS.filter(t => t.conf === c && t.div === d) }));
  });
  grid.innerHTML = blocks.map(b => `
    <div class="division-card">
      <div class="division-title">${b.conf} ${b.div.toUpperCase()}</div>
      <div class="division-teams">
        ${b.teams.map(t => `
          <a class="mini-team-card" href="team.html?team=${t.abbr}" style="--tc-color:${t.color}">
            <div class="mini-team-tint"></div>
            <img class="mini-team-logo-bg" src="${logoUrl(t.abbr)}" alt="">
            <img class="mini-team-logo" src="${logoUrl(t.abbr)}" alt="${t.city} ${t.name}">
            <div>
              <div class="mini-team-name">${t.name}</div>
              <div class="mini-team-city">${t.city}</div>
            </div>
          </a>`).join('')}
    </div>
    </div>`).join('');
}

document.querySelectorAll('.conf-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.conf-tab').forEach(b => b.classList.toggle('active', b===btn));
    renderTeams(btn.dataset.conf);
  });
});

renderTeams('');
</script>
</body>
</html>
