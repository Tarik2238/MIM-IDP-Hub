<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player · Mics in Motion</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c10; --bg2:#0d1117; --bg3:#161b22; --bg4:#1c2128;
  --border:#21262d; --border2:#30363d;
  --text:#e6edf3; --muted:#7d8590; --muted2:#9198a1;
  --orange:#C4722A; --orange-dim:#7a4419; --orange-glow:rgba(196,114,42,.15);
  --green:#238636; --green-light:#2ea043;
  --red:#da3633; --blue:#1f6feb;
  --radius:8px;
  --team-primary:#C4722A; --team-secondary:#080c10;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

/* NAV */
nav{
  background:rgba(13,17,23,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 40px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#fff;text-decoration:none;}
.brand em{color:var(--orange);font-style:normal;}
.nav-center{display:flex;gap:6px;}
.nav-link{font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;padding:6px 14px;border-radius:6px;transition:all .15s;}
.nav-link:hover{color:var(--text);background:var(--bg3);}
.nav-link.active{color:var(--orange);background:var(--orange-glow);}

/* NAV SEARCH */
.nav-search-wrap{position:relative;}
.nav-search{
  background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-family:'Inter',sans-serif;font-size:13px;
  padding:7px 36px 7px 14px;width:200px;outline:none;transition:all .2s;
}
.nav-search:focus{border-color:var(--orange);width:260px;box-shadow:0 0 0 3px var(--orange-glow);}
.nav-search::placeholder{color:var(--muted);}
.nav-search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:14px;}
.nav-search-results{
  position:absolute;top:calc(100% + 8px);right:0;
  width:320px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius);overflow:hidden;z-index:200;
  box-shadow:0 8px 24px rgba(0,0,0,.4);display:none;max-height:360px;overflow-y:auto;
}
.nav-search-results.open{display:block;}
.nsr-item{
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  text-decoration:none;color:var(--text);transition:background .1s;border-bottom:1px solid var(--border);
}
.nsr-item:last-child{border-bottom:none;}
.nsr-item:hover{background:var(--bg4);}
.nsr-hs{width:36px;height:36px;border-radius:4px;object-fit:cover;object-position:top;background:var(--bg2);flex-shrink:0;}
.nsr-hs-fb{width:36px;height:36px;border-radius:4px;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--muted);}
.nsr-name{font-weight:600;font-size:13px;}
.nsr-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.nsr-badge{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;padding:1px 6px;border-radius:3px;background:var(--orange-glow);color:var(--orange);border:1px solid var(--orange-dim);margin-left:auto;flex-shrink:0;}

/* BREADCRUMB */
.breadcrumb{padding:10px 40px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg2);}
.breadcrumb a{color:var(--muted);text-decoration:none;}
.breadcrumb a:hover{color:var(--text);}

/* PLAYER HEADER */
.player-header{
  position:relative;overflow:hidden;
  padding:48px 40px 36px;
  border-bottom:1px solid var(--border);
  min-height:220px;
}
.ph-bg{
  position:absolute;inset:0;
  background:linear-gradient(135deg, var(--team-primary) 0%, rgba(0,0,0,0) 60%);
  opacity:.18;pointer-events:none;
}
.ph-team-watermark{
  position:absolute;right:-20px;top:-20px;
  width:220px;height:220px;object-fit:contain;
  opacity:.06;pointer-events:none;
  filter:blur(1px);
}
.ph-inner{max-width:1200px;margin:0 auto;display:flex;gap:32px;align-items:flex-start;position:relative;z-index:1;}

.ph-hs-wrap{position:relative;flex-shrink:0;}
.ph-hs{
  width:140px;height:140px;border-radius:12px;
  object-fit:cover;object-position:top center;
  border:3px solid rgba(255,255,255,.12);
  background:var(--bg3);box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.ph-hs-fb{
  width:140px;height:140px;border-radius:12px;
  background:var(--bg3);border:3px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--muted);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.ph-team-badge{
  position:absolute;bottom:-8px;right:-8px;
  width:40px;height:40px;border-radius:50%;
  background:var(--bg2);border:3px solid var(--border);
  object-fit:contain;padding:4px;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}

.ph-info{flex:1;min-width:0;padding-top:4px;}
.ph-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.badge{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;padding:4px 11px;border-radius:5px;}
.bp{background:var(--orange-glow);color:var(--orange);border:1px solid var(--orange-dim);}
.bt{background:rgba(46,160,67,.12);color:var(--green-light);border:1px solid rgba(46,160,67,.25);}
.bfa{background:rgba(31,111,235,.1);color:#58a6ff;border:1px solid rgba(31,111,235,.2);}
.bact{background:rgba(46,160,67,.12);color:var(--green-light);border:1px solid rgba(46,160,67,.25);}
.binj{background:rgba(218,54,51,.12);color:var(--red);border:1px solid rgba(218,54,51,.25);}
.bother{background:rgba(125,133,144,.1);color:var(--muted2);border:1px solid var(--border2);}
.bnum{font-size:14px;background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.15);padding:3px 10px;}

.ph-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(36px,5vw,60px);letter-spacing:3px;
  color:#fff;line-height:1;margin-bottom:4px;
  text-shadow:0 2px 12px rgba(0,0,0,.5);
}
.ph-team-name{font-size:15px;color:rgba(255,255,255,.6);font-weight:500;margin-bottom:20px;}

.ph-vitals{
  display:flex;gap:0;
  background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);
  border-radius:var(--radius);overflow:hidden;width:fit-content;
  backdrop-filter:blur(8px);
}
.vital{padding:12px 22px;border-right:1px solid rgba(255,255,255,.06);text-align:center;}
.vital:last-child{border-right:none;}
.vital-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#fff;line-height:1;}
.vital-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:3px;}

.ph-extra{margin-top:16px;display:flex;gap:24px;flex-wrap:wrap;}
.ph-extra-item{font-size:12px;color:rgba(255,255,255,.5);}
.ph-extra-item strong{color:rgba(255,255,255,.8);font-weight:500;}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:32px 40px 80px;}

.section{margin-bottom:32px;}
.section-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff;}
.section-badge{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:var(--bg3);border:1px solid var(--border);padding:3px 9px;border-radius:4px;}
.section-badge.live{color:var(--green-light);background:rgba(46,160,67,.08);border-color:rgba(46,160,67,.2);}

/* CURRENT SEASON STATS */
.cur-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:8px;}
.cstat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;text-align:center;transition:border-color .15s;}
.cstat:hover{border-color:var(--orange);}
.cstat-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--orange);line-height:1;}
.cstat-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:4px;}

.stats-ph{background:var(--bg3);border:1px dashed var(--border2);border-radius:var(--radius);padding:32px;text-align:center;}
.stats-ph-icon{font-size:32px;margin-bottom:12px;}
.stats-ph-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--muted2);margin-bottom:6px;}
.stats-ph-sub{font-size:12px;color:var(--muted);line-height:1.6;}

/* HISTORY */
.hist-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.hist-table{width:100%;border-collapse:collapse;}
.hist-table th{
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);font-weight:600;padding:11px 14px;
  text-align:right;border-bottom:2px solid var(--border);
  white-space:nowrap;background:var(--bg4);
}
.hist-table th:first-child,.hist-table th:nth-child(2),.hist-table th:nth-child(3){text-align:left;}
.hist-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;text-align:right;}
.hist-table td:first-child,.hist-table td:nth-child(2),.hist-table td:nth-child(3){text-align:left;}
.hist-table tr:last-child td{border-bottom:none;}
.hist-table tr:hover td{background:var(--bg4);}
.hist-table tr.cur-row td{background:rgba(196,114,42,.05);}
.hist-table tr.cur-row td:first-child{border-left:3px solid var(--orange);}
.yr-cell{font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff;}
.now-pill{font-size:9px;color:var(--orange);font-family:'Inter',sans-serif;font-weight:700;letter-spacing:1px;margin-left:6px;vertical-align:middle;}
.team-cell{display:flex;align-items:center;gap:8px;}
.tlogo{width:22px;height:22px;object-fit:contain;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--text);}
.stat-val.zero{color:var(--muted);}
.stat-val.top{color:var(--orange);}
.no-data{color:var(--muted);font-style:italic;font-size:11px;}
.hist-note{margin-top:8px;font-size:11px;color:var(--muted);text-align:right;}

/* CUMULATIVE */
.cum-row{
  display:flex;gap:0;
  background:rgba(196,114,42,.06);border:1px solid rgba(196,114,42,.15);
  border-radius:var(--radius);overflow:hidden;margin-bottom:12px;
}
.cum-stat{flex:1;padding:14px 10px;text-align:center;border-right:1px solid rgba(196,114,42,.1);}
.cum-stat:last-child{border-right:none;}
.cum-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--orange);line-height:1;}
.cum-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(196,114,42,.6);margin-top:3px;}

/* IDs */
.id-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.id-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;flex-direction:column;gap:4px;}
.id-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.id-val{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--orange);word-break:break-all;}
.id-val.empty{color:var(--muted);font-size:12px;font-family:'Inter',sans-serif;font-style:italic;}
.id-source{font-size:9px;color:var(--muted);margin-top:2px;}

/* LOADING */
#page-loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:14px;}
#page-loading.done{display:none;}
.pl-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--orange);}
.pl-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:800px){
  nav{padding:0 16px;}
  .nav-search{width:140px;}
  .nav-search:focus{width:180px;}
  .breadcrumb,.main{padding-left:16px;padding-right:16px;}
  .player-header{padding:32px 16px 28px;}
  .ph-inner{flex-direction:column;gap:20px;}
  .ph-hs,.ph-hs-fb{width:100px;height:100px;}
  .ph-vitals{flex-wrap:wrap;}
  .vital{padding:10px 14px;}
  .cur-stats-grid{grid-template-columns:repeat(3,1fr);}
  .hist-table{font-size:11px;}
  .hist-table th,.hist-table td{padding:8px 8px;}
}
</style>
</head>
<body>

<div id="page-loading">
  <div class="spinner"></div>
  <div class="pl-title">LOADING PLAYER</div>
  <div class="pl-sub" id="pl-sub">Connecting…</div>
</div>

<nav>
  <a href="index.html" class="brand">MICS IN <em>MOTION</em></a>
  <div class="nav-center">
    <a href="index.html" class="nav-link">Home</a>
    <a href="players.html" class="nav-link active">Player DB</a>
    <a href="#" class="nav-link">Team Hub</a>
    <a href="#" class="nav-link">Rankings</a>
  </div>
  <div class="nav-search-wrap">
    <input class="nav-search" id="nav-search" type="text" placeholder="Search player…"
      oninput="onNavSearch()" autocomplete="off">
    <span class="nav-search-icon">⌕</span>
    <div class="nav-search-results" id="nav-search-results"></div>
  </div>
</nav>

<div class="breadcrumb">
  <a href="index.html">Home</a><span>›</span>
  <a href="players.html">Player Database</a><span>›</span>
  <span id="bc-name">–</span>
</div>

<div id="player-header" class="player-header" style="display:none">
  <div class="ph-bg" id="ph-bg"></div>
  <img class="ph-team-watermark" id="ph-watermark" src="" alt="" onerror="this.style.display='none'">
  <div class="ph-inner">
    <div class="ph-hs-wrap">
      <img id="ph-hs" class="ph-hs" src="" alt=""
        onerror="this.style.display='none';document.getElementById('ph-hs-fb').style.display='flex'">
      <div id="ph-hs-fb" class="ph-hs-fb" style="display:none"></div>
      <img id="ph-tlogo" class="ph-team-badge" src="" alt="" onerror="this.style.display='none'">
    </div>
    <div class="ph-info">
      <div class="ph-badges" id="ph-badges"></div>
      <div class="ph-name" id="ph-name"></div>
      <div class="ph-team-name" id="ph-team-name"></div>
      <div class="ph-vitals">
        <div class="vital"><div class="vital-val" id="v-ht">–</div><div class="vital-lbl">Height</div></div>
        <div class="vital"><div class="vital-val" id="v-wt">–</div><div class="vital-lbl">Weight</div></div>
        <div class="vital"><div class="vital-val" id="v-age">–</div><div class="vital-lbl">Age</div></div>
        <div class="vital"><div class="vital-val" id="v-exp">–</div><div class="vital-lbl">NFL Exp</div></div>
        <div class="vital"><div class="vital-val" id="v-draft">–</div><div class="vital-lbl">Draft Pick</div></div>
      </div>
      <div class="ph-extra" id="ph-extra"></div>
    </div>
  </div>
</div>

<div class="main" id="main-content" style="display:none">

  <!-- CURRENT SEASON -->
  <div class="section">
    <div class="section-hdr">
      <div class="section-title" id="cur-season-title">2026 Stats</div>
      <div class="section-badge live" id="cur-season-badge">Loading…</div>
    </div>
    <div id="cur-stats-wrap">
      <div class="stats-ph"><div class="stats-ph-icon">⏳</div><div class="stats-ph-title">Loading Stats…</div></div>
    </div>
  </div>

  <!-- CAREER HISTORY -->
  <div class="section">
    <div class="section-hdr">
      <div class="section-title">Career History</div>
      <div class="section-badge" id="hist-badge">–</div>
    </div>
    <!-- Cumulative -->
    <div class="cum-row" id="cum-row" style="display:none"></div>
    <!-- Table -->
    <div class="hist-wrap">
      <table class="hist-table">
        <thead>
          <tr>
            <th>Season</th><th>Team</th><th>Pos</th>
            <th>GP</th><th>STKL</th><th>ATKL</th><th>TKL</th>
            <th>TFL</th><th>SK</th><th>QBH</th><th>HUR</th>
            <th>PBU</th><th>INT</th><th>FF</th><th>TD</th>
          </tr>
        </thead>
        <tbody id="hist-body"></tbody>
      </table>
    </div>
    <div class="hist-note" id="hist-note"></div>
  </div>

  <!-- PLAYER IDs -->
  <div class="section">
    <div class="section-hdr">
      <div class="section-title">Player IDs</div>
      <div class="section-badge">Reference</div>
    </div>
    <div class="id-grid" id="id-grid"></div>
  </div>

</div>

<script>
// ── CONFIG ──
const SLEEPER_PLAYERS_URL = 'https://api.sleeper.app/v1/players/nfl';
const SLEEPER_STATS_URL = (id, yr) =>
  `https://api.sleeper.com/stats/nfl/player/${id}?season_type=regular&season=${yr}&grouping=season`;
const NFLVERSE_BASE = 'https://github.com/nflverse/nflverse-data/releases/download/rosters/roster_';
const CORS = 'https://corsproxy.io/?url=';

const CACHE_KEY = 'mim_sleeper_players';
const CACHE_TS  = 'mim_sleeper_ts';
const CACHE_TTL = 23 * 60 * 60 * 1000;

const CUR_YEAR = new Date().getFullYear();

const ESPN_ABBR = {ARI:'ari',ATL:'atl',BAL:'bal',BUF:'buf',CAR:'car',CHI:'chi',CIN:'cin',CLE:'cle',DAL:'dal',DEN:'den',DET:'det',GB:'gb',HOU:'hou',IND:'ind',JAX:'jax',KC:'kc',LAC:'lac',LAR:'lar',LA:'lar',LV:'lv',MIA:'mia',MIN:'min',NE:'ne',NO:'no',NYG:'nyg',NYJ:'nyj',PHI:'phi',PIT:'pit',SF:'sf',SEA:'sea',TB:'tb',TEN:'ten',WAS:'wsh'};
const TEAM_NAMES = {ARI:'Arizona Cardinals',ATL:'Atlanta Falcons',BAL:'Baltimore Ravens',BUF:'Buffalo Bills',CAR:'Carolina Panthers',CHI:'Chicago Bears',CIN:'Cincinnati Bengals',CLE:'Cleveland Browns',DAL:'Dallas Cowboys',DEN:'Denver Broncos',DET:'Detroit Lions',GB:'Green Bay Packers',HOU:'Houston Texans',IND:'Indianapolis Colts',JAX:'Jacksonville Jaguars',KC:'Kansas City Chiefs',LAC:'Los Angeles Chargers',LAR:'Los Angeles Rams',LA:'Los Angeles Rams',LV:'Las Vegas Raiders',MIA:'Miami Dolphins',MIN:'Minnesota Vikings',NE:'New England Patriots',NO:'New Orleans Saints',NYG:'New York Giants',NYJ:'New York Jets',PHI:'Philadelphia Eagles',PIT:'Pittsburgh Steelers',SF:'San Francisco 49ers',SEA:'Seattle Seahawks',TB:'Tampa Bay Buccaneers',TEN:'Tennessee Titans',WAS:'Washington Commanders'};

const TEAM_COLORS = {
  ARI:'#97233F',ATL:'#A71930',BAL:'#241773',BUF:'#00338D',CAR:'#0085CA',
  CHI:'#0B162A',CIN:'#FB4F14',CLE:'#FF3C00',DAL:'#003594',DEN:'#FB4F14',
  DET:'#0076B6',GB:'#203731',HOU:'#03202F',IND:'#002C5F',JAX:'#006778',
  KC:'#E31837',LAC:'#002A5E',LAR:'#003594',LA:'#003594',LV:'#000000',
  MIA:'#008E97',MIN:'#4F2683',NE:'#002244',NO:'#9F8958',NYG:'#0B2265',
  NYJ:'#125740',PHI:'#004C54',PIT:'#101820',SF:'#AA0000',SEA:'#002244',
  TB:'#D50A0A',TEN:'#0C2340',WAS:'#5A1414',
};

const params = new URLSearchParams(location.search);
const TARGET_ID = params.get('id') || '';

// ── HELPERS ──
function getStore() {
  try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); return localStorage; }
  catch { return sessionStorage; }
}
function idpGroup(pos, dc) {
  const p=(pos||'').toUpperCase(), d=(dc||'').toUpperCase();
  const DL=new Set(['DE','DT','NT','EDGE','IDL','DL']);
  const LB=new Set(['LB','ILB','MLB','OLB']);
  const DB=new Set(['CB','FS','SS','S','DB','SAF']);
  if(p==='OLB') return DB.has(d)?'DB':(DL.has(d)?'DL':'LB');
  if(DL.has(p)&&!LB.has(p)) return 'DL';
  if(LB.has(p)) return 'LB';
  if(DB.has(p)) return 'DB';
  if(DL.has(d)) return 'DL'; if(LB.has(d)) return 'LB'; if(DB.has(d)) return 'DB';
  return pos||'DEF';
}
function fmtHeight(h) {
  if (!h || h === 'NA') return '–';
  // If already in feet/inches format
  if (String(h).includes("'")) return h;
  const inches = parseInt(h);
  if (isNaN(inches)) return h;
  return `${Math.floor(inches/12)}'${inches%12}"`;
}
function sv(v, fallback='–') { return (v !== undefined && v !== null && v !== '') ? v : fallback; }
function statCell(v) {
  const n = parseFloat(v);
  if (isNaN(n) || n === 0) return `<td class="stat-val zero">–</td>`;
  return `<td class="stat-val${n >= 10 ? ' top' : ''}">${n % 1 === 0 ? n : n.toFixed(1)}</td>`;
}

// ── CACHE ──
function getCachedPlayers() {
  try {
    const s = getStore();
    const ts = s.getItem(CACHE_TS);
    if (!ts || Date.now() - parseInt(ts) > CACHE_TTL) return null;
    const raw = s.getItem(CACHE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// ── NAV SEARCH ──
let allPlayers = [];

function onNavSearch() {
  const q = document.getElementById('nav-search').value.trim().toLowerCase();
  const res = document.getElementById('nav-search-results');
  if (q.length < 2) { res.classList.remove('open'); return; }
  const hits = allPlayers.filter(p => (p.full_name||'').toLowerCase().includes(q)).slice(0, 8);
  if (!hits.length) { res.classList.remove('open'); return; }
  res.innerHTML = hits.map(p => {
    const initials = (p.full_name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<a class="nsr-item" href="player.html?id=${encodeURIComponent(p.sleeper_id)}">
      <img class="nsr-hs" src="https://sleepercdn.com/content/nfl/players/${p.sleeper_id}.jpg" alt=""
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="nsr-hs-fb" style="display:none">${initials}</div>
      <div>
        <div class="nsr-name">${p.full_name}</div>
        <div class="nsr-sub">${p.position} · ${p.team||'FA'}</div>
      </div>
      <span class="nsr-badge">${p.position}</span>

}

document.addEventListener('click', e => {
  if (!e.target.closest('.nav-search-wrap'))
    document.getElementById('nav-search-results').classList.remove('open');
});

// ── LOAD PLAYER ──
async function loadPlayer() {
  if (!TARGET_ID) { document.getElementById('pl-sub').textContent = 'No player ID'; return; }

  const sub = id => document.getElementById('pl-sub').textContent = id;
  sub('Checking cache…');

  let playerData = null;

  // 1. Try cache
  const cached = getCachedPlayers();
  if (cached) {
    allPlayers = cached;
    playerData = cached.find(p => p.sleeper_id === TARGET_ID);
  }

  // 2. Fetch from Sleeper if not in cache
  if (!playerData) {
    sub('Fetching from Sleeper…');
    try {
      const r = await fetch(SLEEPER_PLAYERS_URL);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();

      // Build minimal allPlayers for nav search
      const DL=new Set(['DE','DT','NT','EDGE','IDL','DL']);
      const LB=new Set(['LB','ILB','MLB','OLB']);
      const DB=new Set(['CB','FS','SS','S','DB','SAF']);
      allPlayers = Object.entries(data)
        .filter(([,p]) => {
          const pos = (p.position||'').toUpperCase();
          return DL.has(pos)||LB.has(pos)||DB.has(pos);
        })
        .map(([id,p]) => ({
          sleeper_id: id,
          full_name: p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim(),
          position: idpGroup(p.position, p.depth_chart_position),
          team: p.team||'',
        }));

      const raw = data[TARGET_ID];
      if (!raw) throw new Error('Player not found in Sleeper');

      playerData = buildPlayerData(TARGET_ID, raw);
    } catch(e) {
      sub('Error: ' + e.message);
      console.error(e);
      return;
    }
  }

  // 3. Check for missing IDs via nflverse CSV
  sub('Checking IDs…');
  await enrichMissingIds(playerData);

  // 4. Render
  renderPlayer(playerData);

  // 5. Load stats async
  loadStats(playerData);
}

function buildPlayerData(id, raw) {
  return {
    sleeper_id:   id,
    gsis_id:      raw.gsis_id || '',
    pff_id:       raw.stats_id || '',
    espn_id:      raw.espn_id || '',
    full_name:    raw.full_name || `${raw.first_name||''} ${raw.last_name||''}`.trim(),
    first_name:   raw.first_name || '',
    last_name:    raw.last_name || '',
    position:     idpGroup(raw.position, raw.depth_chart_position),
    detail_pos:   raw.depth_chart_position || raw.position || '',
    team:         raw.team || '',
    status:       raw.status || '',
    injury:       raw.injury_status || '',
    number:       raw.number || '',
    age:          raw.age || '',
    height:       raw.height || '',
    weight:       raw.weight || '',
    college:      raw.college || '',
    years_exp:    raw.years_exp ?? '',
    entry_year:   raw.years_exp != null ? (CUR_YEAR - raw.years_exp) : '',
    birth_date:   raw.birth_date || '',
    draft_number: raw.metadata?.draft_number || raw.draft_number || '',
    draft_round:  raw.metadata?.draft_round || raw.draft_round || '',
    draft_club:   raw.metadata?.draft_club || raw.draft_club || '',
    gsis_source:  'sleeper',
    pff_source:   'sleeper',
  };
}

// ── ENRICH MISSING IDs FROM NFLVERSE CSV ──
async function enrichMissingIds(p) {
  if (p.gsis_id && p.pff_id) return; // already have both

  const yearsToCheck = [];
  for (let y = CUR_YEAR; y >= Math.max(2015, CUR_YEAR - 10); y--) yearsToCheck.push(y);

  for (const yr of yearsToCheck) {
    try {
      const url = `${CORS}${encodeURIComponent(NFLVERSE_BASE + yr + '.csv')}`;
      const r = await fetch(url);
      if (!r.ok) continue;
      const text = await r.text();
      const found = findInCSV(text, p);
      if (found) {
        if (!p.gsis_id && found.gsis_id) { p.gsis_id = found.gsis_id; p.gsis_source = `nflverse ${yr}`; }
        if (!p.pff_id && found.pff_id)   { p.pff_id  = found.pff_id;  p.pff_source  = `nflverse ${yr}`; }
        if (p.gsis_id && p.pff_id) break;
      }
    } catch(e) { console.warn(`CSV ${yr}:`, e); }
  }
}

function findInCSV(csv, p) {
  const lines = csv.split('\n');
  if (lines.length < 2) return null;
  const headers = splitCSV(lines[0]);
  const col = k => headers.indexOf(k);
  const C = {
    sleeper: col('sleeper_id'), gsis: col('gsis_id'), pff: col('pff_id'),
    name: col('full_name'), dob: col('birth_date'), college: col('college'),
  };

  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = splitCSV(lines[i]);

    // Match priority 1: Sleeper ID
    if (C.sleeper >= 0 && cols[C.sleeper] === p.sleeper_id) {
      return { gsis_id: cols[C.gsis]||'', pff_id: cols[C.pff]||'' };
    }

    // Match priority 2: Name + DOB + College
    const nameMatch = C.name >= 0 && (cols[C.name]||'').toLowerCase() === (p.full_name||'').toLowerCase();
    const dobMatch  = C.dob >= 0 && p.birth_date && cols[C.dob] === p.birth_date;
    const colMatch  = C.college >= 0 && p.college && (cols[C.college]||'').toLowerCase() === (p.college||'').toLowerCase();

    if (nameMatch && (dobMatch || colMatch)) {
      return { gsis_id: cols[C.gsis]||'', pff_id: cols[C.pff]||'' };
    }
  }
  return null;
}

function splitCSV(line) {
  const cols=[]; let cur='', inQ=false;
  for(const ch of line){
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
    else cur+=ch;
  }
  cols.push(cur.trim());
  return cols;
}

// ── RENDER PLAYER ──
function renderPlayer(p) {
  document.title = `${p.full_name} · Mics in Motion`;
  document.getElementById('bc-name').textContent = p.full_name;

  // Team color for header
  const teamColor = TEAM_COLORS[p.team] || '#C4722A';
  document.documentElement.style.setProperty('--team-primary', teamColor);
  document.getElementById('ph-bg').style.background =
    `linear-gradient(135deg, ${teamColor} 0%, rgba(0,0,0,0) 65%)`;

  // Watermark logo
  const abbr = ESPN_ABBR[p.team] || (p.team||'').toLowerCase();
  if (p.team) {
    document.getElementById('ph-watermark').src =
      `https://a.espncdn.com/i/teamlogos/nfl/500/${abbr}.png`;
    document.getElementById('ph-tlogo').src =
      `https://a.espncdn.com/i/teamlogos/nfl/500/${abbr}.png`;
  }

  // Headshot
  document.getElementById('ph-hs').src =
    `https://sleepercdn.com/content/nfl/players/${p.sleeper_id}.jpg`;
  document.getElementById('ph-hs-fb').textContent =
    (p.full_name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  // Badges
  const teamDisp = p.team || 'FA';
  const teamClass = p.team ? 'bt' : 'bfa';
  const detail = p.detail_pos && p.detail_pos !== p.position ? ` · ${p.detail_pos}` : '';
  let statusBadge = '';
  if (p.status === 'Active') statusBadge = `<span class="badge bact">Active</span>`;
  else if (p.injury) statusBadge = `<span class="badge binj">${p.injury}</span>`;
  else if (p.status) statusBadge = `<span class="badge bother">${p.status}</span>`;

  document.getElementById('ph-badges').innerHTML = `
    <span class="badge bp">${p.position}${detail}</span>
    <span class="badge ${teamClass}">${teamDisp}</span>
    ${statusBadge}
    ${p.number ? `<span class="badge bnum">#${p.number}</span>` : ''}`;

  document.getElementById('ph-name').textContent = p.full_name || '–';
  document.getElementById('ph-team-name').textContent =
    TEAM_NAMES[p.team] || (p.team ? p.team : 'Free Agent');

  // Vitals
  document.getElementById('v-ht').textContent = fmtHeight(p.height);
  document.getElementById('v-wt').textContent = p.weight ? `${p.weight} lbs` : '–';
  document.getElementById('v-age').textContent = p.age || '–';
  document.getElementById('v-exp').textContent = p.years_exp !== '' ? `${p.years_exp}Y` : '–';

  // Draft pick
  let draftDisplay = '–';
  if (p.draft_number) draftDisplay = `#${p.draft_number}`;
  else if (p.entry_year) draftDisplay = 'UDFA';
  document.getElementById('v-draft').textContent = draftDisplay;

  // Extra info
  const extras = [
    p.birth_date ? `<span class="ph-extra-item"><strong>Born:</strong> ${p.birth_date}</span>` : '',
    p.college ? `<span class="ph-extra-item"><strong>College:</strong> ${p.college}</span>` : '',
    p.entry_year ? `<span class="ph-extra-item"><strong>NFL Entry:</strong> ${p.entry_year}</span>` : '',
    p.draft_club && p.draft_number
      ? `<span class="ph-extra-item"><strong>Drafted by:</strong> ${p.draft_club} · Round ${p.draft_round||'?'}, Pick #${p.draft_number}</span>` : '',
  ].filter(Boolean).join('');
  document.getElementById('ph-extra').innerHTML = extras;

  // Current season title
  document.getElementById('cur-season-title').textContent = `${CUR_YEAR} Stats`;

  // History table skeleton
  const startYear = p.entry_year || CUR_YEAR;
  const seasons = [];
  for (let y = CUR_YEAR; y >= parseInt(startYear); y--) seasons.push(y);
  document.getElementById('hist-badge').textContent =
    `${seasons.length} Season${seasons.length!==1?'s':''}`;

  // Render history rows as placeholders (stats loaded async)
  window._playerData = p;
  window._seasons = seasons;
  renderHistoryRows(seasons, p, {});

  // IDs
  renderIds(p);

  // Show page
  document.getElementById('page-loading').classList.add('done');
  document.getElementById('player-header').style.display = 'block';
  document.getElementById('main-content').style.display = 'block';
}

function renderHistoryRows(seasons, p, statsMap) {
  const abbr = ESPN_ABBR[p.team] || (p.team||'').toLowerCase();
  const tbody = document.getElementById('hist-body');
  tbody.innerHTML = seasons.map(yr => {
    const isCur = yr === CUR_YEAR;
    const s = statsMap[yr] || {};
    const hasStats = Object.keys(s).length > 0;

    const teamDisp = isCur ? (p.team||'FA') : (s.team||'–');
    const logoHtml = teamDisp && teamDisp !== '–'
      ? `<img class="tlogo" src="https://a.espncdn.com/i/teamlogos/nfl/500/${ESPN_ABBR[teamDisp]||teamDisp.toLowerCase()}.png" alt="" onerror="this.style.display='none'">`
      : '';
    const detail = p.detail_pos && p.detail_pos !== p.position ? ` · ${p.detail_pos}` : '';

    const stkl = s.def_st ?? s.def_solo ?? null;
    const atkl = s.def_ast ?? null;
    const tkl  = stkl !== null && atkl !== null ? stkl + atkl : (s.def_tkl ?? null);
    const tfl  = s.def_tfl ?? null;
    const sk   = s.def_sack ?? null;
    const qbh  = s.def_qb_hit ?? null;
    const hur  = s.def_hur ?? null;
    const pbu  = s.def_pbu ?? null;
    const int_ = s.def_int ?? null;
    const ff   = s.def_ff ?? null;
    const td   = s.def_td ?? null;
    const gp   = s.gp ?? null;

    const sc = v => v !== null ? statCell(v) : `<td class="no-data">–</td>`;

    return `<tr class="${isCur?'cur-row':''}">
      <td class="yr-cell">${yr}${isCur?'<span class="now-pill">▶</span>':''}</td>
      <td><div class="team-cell">${logoHtml}<span>${teamDisp}</span></div></td>
      <td><span class="badge bp" style="font-size:10px">${p.position}${detail}</span></td>
      ${sc(gp)}${sc(stkl)}${sc(atkl)}${sc(tkl)}
      ${sc(tfl)}${sc(sk)}${sc(qbh)}${sc(hur)}
      ${sc(pbu)}${sc(int_)}${sc(ff)}${sc(td)}
    </tr>`;
  }).join('');
}

// ── LOAD STATS ──
async function loadStats(p) {
  const startYear = Math.max(p.entry_year || (CUR_YEAR - 10), 2015);
  const seasons = window._seasons || [];
  const statsMap = {};
  const cumulative = {gp:0,stkl:0,atkl:0,tfl:0,sk:0,qbh:0,hur:0,pbu:0,int:0,ff:0,td:0};

  let loadedAny = false;

  for (const yr of seasons) {
    try {
      const r = await fetch(SLEEPER_STATS_URL(p.sleeper_id, yr));
      if (!r.ok) continue;
      const data = await r.json();
      if (!data || typeof data !== 'object') continue;

      statsMap[yr] = data;
      loadedAny = true;

      // Accumulate
      cumulative.gp   += parseFloat(data.gp||0);
      cumulative.stkl += parseFloat(data.def_st||data.def_solo||0);
      cumulative.atkl += parseFloat(data.def_ast||0);
      cumulative.tfl  += parseFloat(data.def_tfl||0);
      cumulative.sk   += parseFloat(data.def_sack||0);
      cumulative.qbh  += parseFloat(data.def_qb_hit||0);
      cumulative.hur  += parseFloat(data.def_hur||0);
      cumulative.pbu  += parseFloat(data.def_pbu||0);
      cumulative.int  += parseFloat(data.def_int||0);
      cumulative.ff   += parseFloat(data.def_ff||0);
      cumulative.td   += parseFloat(data.def_td||0);
    } catch(e) { console.warn(`Stats ${yr}:`, e); }
  }

  // Render current season stats
  const curStats = statsMap[CUR_YEAR];
  const csWrap = document.getElementById('cur-stats-wrap');
  const csBadge = document.getElementById('cur-season-badge');

  if (curStats && Object.keys(curStats).length > 0) {
    csBadge.textContent = 'Live';
    csBadge.className = 'section-badge live';
    const stats = [
      {lbl:'GP',    v: curStats.gp},
      {lbl:'STKL',  v: curStats.def_st ?? curStats.def_solo},
      {lbl:'ATKL',  v: curStats.def_ast},
      {lbl:'TFL',   v: curStats.def_tfl},
      {lbl:'Sacks', v: curStats.def_sack},
      {lbl:'QBH',   v: curStats.def_qb_hit},
      {lbl:'HUR',   v: curStats.def_hur},
      {lbl:'PBU',   v: curStats.def_pbu},
      {lbl:'INT',   v: curStats.def_int},
      {lbl:'FF',    v: curStats.def_ff},
      {lbl:'TD',    v: curStats.def_td},
    ].filter(s => s.v !== undefined && s.v !== null && s.v !== 0);

    csWrap.innerHTML = stats.length
      ? `<div class="cur-stats-grid">${stats.map(s=>`<div class="cstat"><div class="cstat-val">${parseFloat(s.v)%1===0?parseFloat(s.v):parseFloat(s.v).toFixed(1)}</div><div class="cstat-lbl">${s.lbl}</div></div>`).join('')}</div>`
      : `<div class="stats-ph"><div class="stats-ph-icon">📋</div><div class="stats-ph-title">No Stats Yet</div><div class="stats-ph-sub">Season may not have started yet.</div></div>`;
  } else {
    csBadge.textContent = 'Pending';
    csBadge.className = 'section-badge';
    csWrap.innerHTML = `<div class="stats-ph"><div class="stats-ph-icon">📋</div><div class="stats-ph-title">No Current Season Stats</div><div class="stats-ph-sub">Stats not yet available for ${CUR_YEAR}.</div></div>`;
  }

  // Cumulative row
  if (loadedAny) {
    const cumRow = document.getElementById('cum-row');
    cumRow.style.display = 'flex';
    const fmt = v => v % 1 === 0 ? v : v.toFixed(1);
    cumRow.innerHTML = [
      {lbl:'Career GP',   v:fmt(cumulative.gp)},
      {lbl:'Solo Tkl',    v:fmt(cumulative.stkl)},
      {lbl:'Ast Tkl',     v:fmt(cumulative.atkl)},
      {lbl:'TFL',         v:fmt(cumulative.tfl)},
      {lbl:'Sacks',       v:fmt(cumulative.sk)},
      {lbl:'QBH',         v:fmt(cumulative.qbh)},
      {lbl:'Hurries',     v:fmt(cumulative.hur)},
      {lbl:'PBU',         v:fmt(cumulative.pbu)},
      {lbl:'INT',         v:fmt(cumulative.int)},
      {lbl:'FF',          v:fmt(cumulative.ff)},
      {lbl:'TD',          v:fmt(cumulative.td)},
    ].map(s=>`<div class="cum-stat"><div class="cum-val">${s.v}</div><div class="cum-lbl">${s.lbl}</div></div>`).join('');
  }

  // Re-render history with actual stats
  renderHistoryRows(window._seasons, p, statsMap);
  document.getElementById('hist-note').textContent =
    loadedAny ? 'Stats via Sleeper · Roster data from nflverse' : 'Stats not available · Roster data from nflverse';
}

// ── RENDER IDs ──
function renderIds(p) {
  const ids = [
    {lbl:'Sleeper ID', val:p.sleeper_id, source:'Sleeper'},
    {lbl:'GSIS ID',    val:p.gsis_id,    source:p.gsis_source||'Sleeper'},
    {lbl:'PFF ID',     val:p.pff_id,     source:p.pff_source||'Sleeper'},
    {lbl:'ESPN ID',    val:p.espn_id,    source:'Sleeper'},
  ];
  document.getElementById('id-grid').innerHTML = ids.map(d => `
    <div class="id-box">
      <div class="id-lbl">${d.lbl}</div>
      <div class="id-val ${!d.val?'empty':''}">${d.val||'Not available'}</div>
      ${d.val ? `<div class="id-source">Source: ${d.source}</div>` : ''}
    </div>`).join('');
}
