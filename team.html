<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Team-Kader & IDP-Übersicht</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --dl-color: #ff7b72;
      --lb-color: #7ee787;
      --db-color: #a5d6ff;
      --dt-color: #f2cc60;
      --ed-color: #d2a8ff;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 15px;
      margin-bottom: 20px;
    }
    h1 { margin: 0; font-size: 1.5rem; color: #fff; }
    .back-btn {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    #init-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: var(--bg); z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #init-overlay.done { opacity: 0; pointer-events: none; transform: scale(1.02); }
    .progress-box { width: 300px; text-align: center; }
    .progress-bg { background: #21262d; border-radius: 6px; height: 12px; width: 100%; overflow: hidden; margin-top: 10px; }
    .progress-bar { background: var(--accent); width: 0%; height: 100%; transition: width 0.2s ease; }
    #init-sub { font-size: 0.85rem; color: var(--text-muted); margin-top: 5px; }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }
    .player-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      position: relative;
    }
    .avatar {
      width: 65px; height: 65px;
      border-radius: 50%; background: #21262d;
      object-fit: cover; border: 1px solid var(--border);
    }
    .info { display: flex; flex-direction: column; gap: 3px; }
    .name { font-weight: 600; color: #fff; font-size: 1.05rem; }
    .meta { font-size: 0.85rem; color: var(--text-muted); }
    .pos-badge {
      position: absolute; top: 12px; right: 12px;
      font-size: 0.75rem; font-weight: bold;
      padding: 3px 8px; border-radius: 4px;
      color: #000;
    }
    .badge-DL { background-color: var(--dl-color); }
    .badge-LB { background-color: var(--lb-color); }
    .badge-DB { background-color: var(--db-color); }
    .badge-DT { background-color: var(--dt-color); }
    .badge-ED { background-color: var(--ed-color); }
    .badge-UNKNOWN { background-color: var(--text-muted); color: #fff; }
  </style>
</head>
<body>

  <div id="init-overlay">
    <div class="progress-box">
      <h3 style="margin:0; color:#fff;">Lade Teamdaten...</h3>
      <div class="progress-bg"><div id="init-bar" class="progress-bar"></div></div>
      <div id="init-sub">Verbinde mit APIs...</div>
    </div>
  </div>

  <header>
    <h1 id="team-title">Team Kader</h1>
    <a href="team-hub.html" class="back-btn">← Zurück zum Hub</a>
  </header>

  <main>
    <div class="grid" id="roster-grid"></div>
  </main>

  <script>
    const SLEEPER_PLAYERS_URL = 'https://api.sleeper.app/v1/players/nfl';
    const CACHE_KEY = 'idp_players_cache';
    const CACHE_TTL = 12 * 60 * 60 * 1000;

    const PFF_POS_MAP = {
      DI: 'DT', DT: 'DT', NT: 'DT', IDL: 'DT',
      ED: 'ED', DE: 'ED', EDGE: 'ED',
      LB: 'LB', ILB: 'LB', MLB: 'LB', OLB: 'LB',
      CB: 'CB', S: 'S', FS: 'DB', SS: 'DB', SAF: 'DB', DB: 'DB'
    };

    function idpGroups(p) {
      if (!p || !p.position) return [];
      const valid = ['DL','LB','DB','DT','DE','OLB','ILB','CB','SS','FS','S'];
      return valid.includes(p.position.toUpperCase()) ? [p.position.toUpperCase()] : [];
    }

    function getTeamParam() {
      const params = new URLSearchParams(window.location.search);
      return (params.get('team') || '').toUpperCase();
    }

    async function loadTeamRoster() {
      const bar = document.getElementById('init-bar');
      const sub = document.getElementById('init-sub');
      const targetTeam = getTeamParam();

      if (!targetTeam) {
        sub.textContent = "Fehler: Kein Team übergeben (z.B. ?team=BUF)";
        bar.style.background = "#da3633";
        return;
      }

      document.getElementById('team-title').textContent = `${targetTeam} - IDP Roster`;

      let localPlayers = [];
      const cachedData = localStorage.getItem(CACHE_KEY);
      const cachedTime = localStorage.getItem(CACHE_KEY + '_time');

      if (cachedData && cachedTime && (Date.now() - cachedTime < CACHE_TTL)) {
        sub.textContent = 'Lade Daten aus Cache...';
        bar.style.width = '50%';
        localPlayers = JSON.parse(cachedData);
      } else {
        try {
          sub.textContent = 'Lade frische Daten von Sleeper...';
          bar.style.width = '40%';
          const res = await fetch(SLEEPER_PLAYERS_URL);
          const data = await res.json();
          
          localPlayers = Object.entries(data).map(([id, p]) => {
            const groups = idpGroups(p);
            if (!groups.length) return null;
            return {
              sleeper_id: id,
              gsis_id: (p.gsis_id || '').trim(),
              full_name: p.full_name || `${p.first_name || ''} ${p.last_name || ''}`.trim(),
              team: (p.team || '').toUpperCase(),
              position: groups[0],
              detail_pos: p.position || '',
              number: p.number || '--',
              age: p.age || ''
            };
          }).filter(Boolean);

          localStorage.setItem(CACHE_KEY, JSON.stringify(localPlayers));
          localStorage.setItem(CACHE_KEY + '_time', Date.now().toString());
        } catch (e) {
          console.error("Sleeper Fetch Fehler", e);
        }
      }

      let teamPlayers = localPlayers.filter(p => p.team === targetTeam);
      
      // Map positions using PFF map fallback
      teamPlayers.forEach(p => {
        p.detail_pos = PFF_POS_MAP[p.detail_pos.toUpperCase()] || p.detail_pos;
      });

      bar.style.width = '90%';
      sub.textContent = 'Generiere Roster Ansicht...';
      
      teamPlayers.sort((a, b) => a.detail_pos.localeCompare(b.detail_pos) || a.full_name.localeCompare(b.full_name));

      renderGrid(teamPlayers);

      bar.style.width = '100%';
      setTimeout(() => {
        document.getElementById('init-overlay').classList.add('done');
      }, 200);
    }

    function renderGrid(playerList) {
      const grid = document.getElementById('roster-grid');
      grid.innerHTML = '';

      if (playerList.length === 0) {
        grid.innerHTML = `<p style="color: var(--text-muted)">Keine IDP-Spieler für dieses Team gefunden.</p>`;
        return;
      }

      playerList.forEach(p => {
        const card = document.createElement('div');
        card.className = 'player-card';

        const badgeClass = ['DL','LB','DB','DT','ED'].includes(p.detail_pos) ? `badge-${p.detail_pos}` : 'badge-UNKNOWN';
        const imgUrl = `https://sleepercdn.com/content/nfl/players/${p.sleeper_id}.jpg`;

        card.innerHTML = `
          <div class="pos-badge ${badgeClass}">${p.detail_pos}</div>
          <img class="avatar" src="${imgUrl}" onerror="this.src='https://sleepercdn.com/images/v2/placeholder_player.png'" alt="${p.full_name}">
          <div class="info">
            <div class="name">${p.full_name}</div>
            <div class="meta">#${p.number} · Alter: ${p.age || '--'}</div>
            <div class="meta" style="font-family: monospace; font-size:0.75rem;">GSIS-ID: ${p.gsis_id || 'N/A'}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    window.addEventListener('DOMContentLoaded', loadTeamRoster);
  </script>
</body>
</html>
