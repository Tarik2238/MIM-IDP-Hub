<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDP Rankings · Mics in Motion</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c10;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2128;
  --border:#21262d;--border2:#30363d;
  --text:#e6edf3;--muted:#7d8590;--muted2:#9198a1;
  --orange:#C4722A;--orange-dim:#7a4419;--orange-glow:rgba(196,114,42,.15);
  --green:#238636;--green-light:#2ea043;--red:#da3633;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

/* NAV (shared pattern) */
nav{background:rgba(13,17,23,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#fff;text-decoration:none;}
.brand em{color:var(--orange);font-style:normal;}
.nav-mid{display:flex;gap:4px;}
.nav-link{font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .15s;}
.nav-link:hover{color:var(--text);background:var(--bg3);}
.nav-link.active{color:var(--orange);background:var(--orange-glow);}

/* AUTH WIDGET + MODAL (shared with index.html) */
.auth-wrap{display:flex;align-items:center;gap:10px;}
.auth-btn{font-size:12px;font-weight:600;letter-spacing:.5px;color:var(--text);background:var(--bg3);border:1px solid var(--border);padding:7px 16px;border-radius:6px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.auth-btn:hover{border-color:var(--orange);}
.auth-user{display:flex;align-items:center;gap:10px;}
.auth-avatar{width:30px;height:30px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;}
.auth-name{font-size:13px;font-weight:500;color:var(--text);}
.auth-logout{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:'Inter',sans-serif;}
.auth-logout:hover{color:var(--text);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(3px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:32px;width:100%;max-width:360px;position:relative;}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#fff;margin-bottom:4px;}
.modal-tabs{display:flex;gap:4px;margin:16px 0 20px;border-bottom:1px solid var(--border);}
.modal-tab{flex:1;text-align:center;padding:8px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:1px;text-transform:uppercase;}
.modal-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.modal-field{margin-bottom:14px;}
.modal-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;}
.modal-field input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;}
.modal-field input:focus{border-color:var(--orange);}
.modal-submit{width:100%;background:var(--orange);color:#fff;border:none;padding:11px;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;margin-top:6px;font-family:'Inter',sans-serif;}
.modal-submit:hover{opacity:.9;}
.modal-error{color:var(--red);font-size:12px;margin-top:10px;display:none;}
.modal-error.show{display:block;}
.modal-pane{display:none;}
.modal-pane.active{display:block;}

/* TOOLBAR */
.toolbar{padding:20px 32px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap;}
.tb-left{flex-shrink:0;}
.tb-center{flex:1;display:flex;justify-content:center;align-items:flex-start;gap:56px;flex-wrap:wrap;}
.tb-right{flex-shrink:0;display:flex;align-items:center;gap:12px;}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:#fff;}
.tb-title span{color:var(--orange);}
.tb-group{display:flex;flex-direction:column;gap:6px;}
.tb-group label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.tb-select{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:9px 12px;min-width:220px;outline:none;}
.tb-select:focus{border-color:var(--orange);}
.pos-tabs{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:3px;}
.pos-tab{background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;padding:7px 16px;border-radius:6px;cursor:pointer;transition:all .15s;}
.pos-tab:hover{color:var(--text);}
.pos-tab.active{background:var(--orange);color:#fff;}
.fmt-tabs{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:3px;}
.fmt-tab{background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;padding:7px 16px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.fmt-tab:hover{color:var(--text);}
.fmt-tab.active{background:var(--orange);color:#fff;}
.avatar-row{display:flex;gap:12px;height:56px;align-items:center;}
.avatar-item{background:none;border:none;padding:0;cursor:pointer;position:relative;}
.avatar-img,.avatar-fallback{width:56px;height:56px;border-radius:12px;object-fit:cover;display:block;border:2px solid transparent;transition:all .15s;box-sizing:border-box;opacity:.4;filter:grayscale(60%);}
.avatar-fallback{background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:22px;}
.avatar-item:hover .avatar-img,.avatar-item:hover .avatar-fallback{opacity:.75;filter:grayscale(20%);}
.avatar-item.active .avatar-img,.avatar-item.active .avatar-fallback{opacity:1;filter:none;}
.avatar-overview{background:var(--bg4);color:var(--orange);border:2px solid var(--orange-dim);font-size:24px;}
.ov-rater-warn{color:var(--orange);font-weight:700;font-size:10px;margin-left:4px;}
.ov-user-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.ov-user-tag{font-size:9px;font-weight:700;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;color:var(--muted2);}
.ov-user-tag-none{color:var(--muted);font-weight:400;font-style:italic;}
.avatar-item .avatar-tip{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap;opacity:0;transition:opacity .15s;pointer-events:none;}
.avatar-item:hover .avatar-tip,.avatar-item.active .avatar-tip{opacity:1;}
.status-pill{font-size:11px;padding:5px 12px;border-radius:20px;font-weight:600;letter-spacing:.5px;white-space:nowrap;}.status-edit{background:rgba(46,160,67,.12);color:var(--green-light);border:1px solid rgba(46,160,67,.25);}
.status-view{background:var(--bg3);color:var(--muted);border:1px solid var(--border2);}
.save-indicator{font-size:11px;color:var(--muted);opacity:0;transition:opacity .3s;}
.save-indicator.show{opacity:1;}
.export-btn{font-size:12px;font-weight:600;letter-spacing:.5px;color:var(--text);background:var(--bg3);border:1px solid var(--border2);padding:9px 16px;border-radius:8px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;}
.export-btn:hover{border-color:var(--orange);color:var(--orange);}

/* SEARCH */
.search-bar{padding:16px 32px;border-bottom:1px solid var(--border);background:var(--bg);position:relative;}
.search-input-wrap{position:relative;max-width:420px;}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:10px 14px;outline:none;}
.search-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-glow);}
.search-input:disabled{opacity:.4;cursor:not-allowed;}
.search-hint{font-size:11px;color:var(--muted);margin-top:6px;}
.search-res{position:absolute;top:calc(100% + 6px);left:0;width:100%;max-width:420px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);z-index:150;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;max-height:320px;overflow-y:auto;}
.search-res.open{display:block;}
.sri{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--border);}
.sri:last-child{border-bottom:none;}
.sri:hover{background:var(--bg4);}
.sri-hs{width:30px;height:30px;border-radius:4px;object-fit:cover;object-position:top;background:var(--bg2);flex-shrink:0;}
.sri-fb{width:30px;height:30px;border-radius:4px;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--muted);}
.sri-name{font-weight:600;font-size:13px;}
.sri-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.sri-added{font-size:10px;color:var(--muted);margin-left:auto;font-style:italic;}

/* BOARD */
.board-wrap{padding:24px 32px 60px;overflow-x:auto;}
.board{display:flex;gap:12px;width:100%;}
.col{flex:1 1 0;min-width:150px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;max-height:calc(100vh - 260px);}
.col-inbox{border-style:dashed;border-color:var(--border2);}
.col-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:var(--radius) var(--radius) 0 0;}
.col-hdr-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;color:#fff;}
.col-hdr-count{font-size:11px;color:var(--muted);background:var(--bg4);border-radius:10px;padding:2px 8px;}
.tier-1 .col-hdr-title{color:#e0464a;}
.tier-2 .col-hdr-title{color:var(--orange);}
.tier-3 .col-hdr-title{color:#d4a72c;}
.tier-4 .col-hdr-title{color:var(--green-light);}
.tier-5 .col-hdr-title{color:#58a6ff;}
.tier-6 .col-hdr-title{color:var(--muted2);}
.tier-7 .col-hdr-title{color:#8b6dd6;}
.col-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:80px;}
.col-body.drag-over{background:var(--orange-glow);outline:2px dashed var(--orange);outline-offset:-6px;}
.col-empty{font-size:11px;color:var(--muted);text-align:center;padding:20px 8px;font-style:italic;}

/* CARD */
.pcard{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;display:flex;align-items:center;gap:8px;touch-action:none;user-select:none;position:relative;}
.pcard-suggested{border-style:dashed;border-color:var(--muted2);background:var(--bg2);}
.pcard-tag{color:var(--orange);font-weight:700;}
.pcard-rank{position:absolute;top:6px;right:6px;font-size:10px;font-weight:700;color:var(--muted2);background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;}
.pcard.editable{cursor:grab;}
.pcard.editable:active{cursor:grabbing;}
.pcard.dragging{opacity:.3;}
.pcard-hs{width:32px;height:32px;border-radius:4px;object-fit:cover;object-position:top;background:var(--bg2);flex-shrink:0;}
.pcard-fb{width:32px;height:32px;border-radius:4px;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--muted);}
.pcard-info{flex:1;min-width:0;}
.pcard-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.pcard-rm{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 4px;flex-shrink:0;line-height:1;}
.pcard-rm:hover{color:var(--red);}

.drag-clone{position:fixed;pointer-events:none;z-index:1000;width:190px;box-shadow:0 12px 30px rgba(0,0,0,.6);border-radius:6px;opacity:.95;transform:rotate(2deg);}

.empty-state{padding:60px 32px;text-align:center;color:var(--muted);}
.empty-state h3{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;letter-spacing:1px;margin-bottom:8px;}

/* COMPARE PANEL */
.compare-panel{position:fixed;top:60px;right:0;bottom:0;width:360px;background:var(--bg2);border-left:1px solid var(--border);box-shadow:-8px 0 24px rgba(0,0,0,.4);transform:translateX(100%);transition:transform .25s ease;z-index:400;overflow-y:auto;display:flex;flex-direction:column;}
.compare-panel.open{transform:translateX(0);}
.compare-hdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:2;}
.compare-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:#fff;}
.compare-close-all{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:'Inter',sans-serif;}
.compare-close-all:hover{color:var(--text);}
.compare-body{flex:1;}
.compare-player{position:relative;border-bottom:1px solid var(--border);padding:18px;}
.cmp-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;}
.cmp-close:hover{color:var(--red);}
.cmp-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-right:20px;}
.cmp-hs,.cmp-hs-fb{width:52px;height:52px;border-radius:8px;object-fit:cover;object-position:top;background:var(--bg3);flex-shrink:0;}
.cmp-hs-fb{display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);}
.cmp-name{font-size:15px;font-weight:700;color:#fff;}
.cmp-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.cmp-loading{font-size:12px;color:var(--muted);font-style:italic;padding:8px 0 14px;}
.cmp-pts-row{display:flex;gap:8px;margin-bottom:14px;}
.cmp-pts-cell{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 6px;text-align:center;}
.cmp-pts-year{font-size:10px;color:var(--muted);letter-spacing:.5px;}
.cmp-pts-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--orange);margin-top:2px;}
.cmp-stats-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.cmp-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-bottom:14px;}
.cmp-stat{display:flex;justify-content:space-between;font-size:12px;border-bottom:1px dashed var(--border);padding-bottom:3px;}
.cmp-stat-label{color:var(--muted);}
.cmp-stat-val{font-weight:600;}
.cmp-profile-link{display:block;text-align:center;font-size:12px;font-weight:600;color:var(--orange);text-decoration:none;padding:8px;border:1px solid var(--orange-dim);border-radius:6px;transition:all .15s;}
.cmp-profile-link:hover{background:var(--orange-glow);}

@media(max-width:700px){
  nav{padding:0 20px;}
  .toolbar,.search-bar{padding:16px 20px;}
  .board-wrap{padding:16px 20px 40px;}
  .col{min-width:130px;}
}
</style>
</head>

<nav>
  <a href="index.html" class="brand">MICS IN <em>MOTION</em></a>
  <div class="nav-mid">
    <a href="index.html" class="nav-link">Home</a>

<script type="module">
import { watchAuth, loginUser, logoutUser, loadBoard, saveBoard, listAllRankings, watchBoard, avatarFor } from './firebase-init.js';

// ── SLEEPER PLAYER CACHE (wie player.html / players.html) ──────────────────
const SLEEPER_ALL = 'https://api.sleeper.app/v1/players/nfl';
// Cache-Key exakt identisch zu players.html/player.html/compare.html — alle 4 Seiten
// teilen sich EINEN Sleeper-Cache, damit z.B. Doppel-Tags (DL/LB) nie zwischen den
// Seiten auseinanderlaufen können, nur weil eine Seite zu einem anderen Zeitpunkt
// unabhängig neu von Sleeper geladen hat.
const CACHE_KEY = 'mim_sleeper_players_v3', CACHE_TS = 'mim_sleeper_ts_v3', CACHE_TTL = 23*60*60*1000;
function store(){ try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return localStorage;}catch{return sessionStorage;} }
const DL_SET=new Set(['DE','DT','NT','EDGE','IDL','DL']), LB_SET=new Set(['LB','ILB','MLB','OLB']), DB_SET=new Set(['CB','FS','SS','S','DB','SAF']);
function classifyTag(tag){
  const t=(tag||'').toUpperCase();
  if(DL_SET.has(t)) return 'DL';
  if(LB_SET.has(t)) return 'LB';
  if(DB_SET.has(t)) return 'DB';
  return null;
}
// Ermittelt ALLE IDP-Gruppen eines Spielers (z.B. T.J. Watt / Micah Parsons: LB + DL),
// primär über Sleepers eigenes fantasy_positions-Array (dort führt Sleeper Mehrfach-Tags),
// mit position/depth_chart_position als Fallback falls fantasy_positions fehlt.
function classifyPlayer(x){
  const groups = new Set();
  const tags = (x.fantasy_positions && x.fantasy_positions.length) ? x.fantasy_positions : [x.position];
  tags.forEach(t => { const c = classifyTag(t); if(c) groups.add(c); });
  if(groups.size === 0){ const c2 = classifyTag(x.depth_chart_position); if(c2) groups.add(c2); }
  return [...groups];
}

// ── LIGA SCORING (identisch zu player.html) ────────────────────────────────
const LIGA_SCORING = {idp_tkl_solo:1.5, idp_tkl_ast:0.5, idp_sack:4, idp_qb_hit:1,
  idp_tkl_loss:2, idp_pass_def:3, idp_int:6, idp_fum_rec:2, idp_ff:4, idp_td:6,
  idp_safe:10, idp_blk_kick:6};
function getStat(s, ...keys){ if(!s) return null; for(const k of keys){ if(s[k]!==undefined && s[k]!==null) return parseFloat(s[k]); } return null; }
function calcPts(s){
  if(!s) return 0;
  let pts = 0;
  for(const [k,v] of Object.entries(LIGA_SCORING)){ const val = getStat(s,k); if(val && val>0) pts += val*v; }
  return Math.round(pts*100)/100;
}
const SL_SEASON_DIRECT = (id,yr) => `https://api.sleeper.com/stats/nfl/player/${id}?season_type=regular&season=${yr}&grouping=season`;
const SL_SEASON_PROXY  = (id,yr) => `https://corsproxy.io/?url=${encodeURIComponent(SL_SEASON_DIRECT(id,yr))}`;
async function fetchSeasonStats(id, yr){
  for(const url of [SL_SEASON_DIRECT(id,yr), SL_SEASON_PROXY(id,yr)]){
    try{
      const r = await fetch(url);
      if(!r.ok) continue;
      const t = await r.text();
      if(!t || t === 'null') return null;
      const obj = JSON.parse(t);
      if(!obj || typeof obj !== 'object') continue;
      return obj.stats ? obj.stats : obj;
    }catch(e){}
  }
  return null;
}

// ── TOP 50 LEADERBOARD (Dynasty & Redraft — Inbox-Vorschläge) ──────────────
// Holt in EINEM Bulk-Request alle DL/LB/DB-Spieler einer Season (statt tausender
// Einzelabfragen) und errechnet daraus Top-50-Listen pro Position nach unserer
// eigenen Liga-Scoring-Formel. Wird NIE automatisch gespeichert — nur zur Anzeige
// in der Inbox verwendet; erst ein aktives Ziehen in ein Tier landet wirklich im Board.
const TOP50_SEASON = 2025;
const TOP50_CACHE_KEY = `mim_top50_${TOP50_SEASON}`, TOP50_CACHE_TS = `mim_top50_ts_${TOP50_SEASON}`, TOP50_CACHE_TTL = 23*60*60*1000;
const SL_BULK_SEASON_DIRECT = yr => `https://api.sleeper.com/stats/nfl/${yr}?season_type=regular&position[]=DL&position[]=LB&position[]=DB`;
const SL_BULK_SEASON_PROXY  = yr => `https://corsproxy.io/?url=${encodeURIComponent(SL_BULK_SEASON_DIRECT(yr))}`;
let top50ByPos = { DL: [], LB: [], DB: [] }; // { DL:[sleeper_id,...], ... } bereits sortiert & auf 50 gekappt

async function fetchBulkSeasonStats(yr){
  for(const url of [SL_BULK_SEASON_DIRECT(yr), SL_BULK_SEASON_PROXY(yr)]){
    try{
      const r = await fetch(url);
      if(!r.ok) continue;
      const t = await r.text();
      if(!t || t === 'null') continue;
      const obj = JSON.parse(t);
      if(Array.isArray(obj) && obj.length) return obj;
      if(obj && typeof obj === 'object' && Object.keys(obj).length) return Object.values(obj);
    }catch(e){}
  }
  return null;
}

async function loadTop50Leaderboard(){
  const cached = (()=>{ try{ const s=store(), ts=s.getItem(TOP50_CACHE_TS); if(ts && Date.now()-parseInt(ts)<TOP50_CACHE_TTL){ const r=s.getItem(TOP50_CACHE_KEY); return r?JSON.parse(r):null; } }catch{} return null; })();
  if(cached){ top50ByPos = cached; return; }

  const entries = await fetchBulkSeasonStats(TOP50_SEASON);
  if(!entries){ return; } // Bulk-Endpoint down/geblockt → Inbox zeigt einfach keine Vorschläge, kein Fehlerfall

  const scored = { DL: [], LB: [], DB: [] };
  entries.forEach(entry => {
    const pid = entry.player_id != null ? String(entry.player_id) : null;
    if(!pid) return;
    const p = playerMap[pid];
    if(!p) return; // nicht in unserem IDP-Pool (z.B. falsch gefiltert von Sleeper zurückgegeben)
    const stats = entry.stats || entry;
    const pts = calcPts(stats);
    if(pts <= 0) return;
    (p.positions||[p.position]).forEach(pos => {
      if(scored[pos]) scored[pos].push({ id: pid, pts });
    });
  });

  ['DL','LB','DB'].forEach(pos => {
    scored[pos].sort((a,b) => b.pts - a.pts);
    top50ByPos[pos] = scored[pos].slice(0, 50).map(x => x.id);
  });

  try{ const s=store(); s.setItem(TOP50_CACHE_KEY, JSON.stringify(top50ByPos)); s.setItem(TOP50_CACHE_TS, Date.now().toString()); }catch{}
}

// Lokal (nur dieser Browser) ausgeblendete Top-50-Vorschläge — betrifft nie Firestore/andere Nutzer
function getDismissedSuggestions(){
  try{ return JSON.parse(store().getItem('mim_dismissed_suggestions') || '[]'); }catch{ return []; }
}
function dismissSuggestion(id){
  const list = getDismissedSuggestions();
  if(!list.includes(id)){ list.push(id); try{ store().setItem('mim_dismissed_suggestions', JSON.stringify(list)); }catch{} }
}

// Baut die tatsächlich angezeigte Inbox-Liste: echte board.inbox-Einträge + Top-50-Vorschläge,
// abzüglich bereits getierter Spieler, abzüglich lokal ausgeblendeter Vorschläge.
// Rookie-Listen bleiben unverändert (keine Vorschläge dort).
function computeDisplayInbox(){
  if(currentListType === 'rookie') return { ids: board.inbox || [], suggestedSet: new Set() };
  const realIds = board.inbox || [];
  const tieredSet = new Set(TIERS.filter(t => t !== 'inbox').flatMap(t => board[t] || []));
  const dismissed = new Set(getDismissedSuggestions());
  const suggestions = (top50ByPos[currentPositionTag] || []).filter(id =>
    !tieredSet.has(id) && !realIds.includes(id) && !dismissed.has(id)
  );
  return { ids: [...realIds, ...suggestions], suggestedSet: new Set(suggestions) };
}

async function loadPlayerSeasons(id){
  const years = [NOW_YEAR, NOW_YEAR-1, NOW_YEAR-2];
  const pts = {};
  let lastSeasonStats = null;
  for(const yr of years){
    const s = await fetchSeasonStats(id, yr);
    pts[yr] = s ? calcPts(s) : 0;
    if(yr === NOW_YEAR-1) lastSeasonStats = s;

  return { pts, lastSeasonStats };
}

// ── DRAG & DROP (Pointer Events — funktioniert für Maus & Touch) ──────────
let dragState = null;

function onCardPointerDown(e){
  if(e.button !== undefined && e.button !== 0) return;
  if(e.target.closest('.pcard-rm')) return; // Klick auf Entfernen-Button darf kein Drag starten
  const card = e.currentTarget;
  const id = card.dataset.id, fromTier = card.dataset.tier;
  const rect = card.getBoundingClientRect();
  const clone = card.cloneNode(true);
  clone.classList.add('drag-clone');
  clone.style.left = rect.left + 'px';
  clone.style.top = rect.top + 'px';
  clone.style.width = rect.width + 'px';
  document.body.appendChild(clone);
  card.classList.add('dragging');

  dragState = {
    id, fromTier, card, clone,
    startX: e.clientX, startY: e.clientY, moved: false,
    offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top,
    targetTier: fromTier
  };
  card.setPointerCapture(e.pointerId);
  card.addEventListener('pointermove', onCardPointerMove);
  card.addEventListener('pointerup', onCardPointerUp);
  card.addEventListener('pointercancel', onCardPointerUp);
  e.preventDefault();
}

function onCardPointerMove(e){
  if(!dragState) return;
  const { clone, offsetX, offsetY, startX, startY } = dragState;
  if(!dragState.moved && (Math.abs(e.clientX-startX) > 4 || Math.abs(e.clientY-startY) > 4)) dragState.moved = true;
  clone.style.left = (e.clientX - offsetX) + 'px';
  clone.style.top = (e.clientY - offsetY) + 'px';

  document.querySelectorAll('.col-body.drag-over').forEach(el => el.classList.remove('drag-over'));
  clone.style.pointerEvents = 'none';
  const under = document.elementFromPoint(e.clientX, e.clientY);
  const colBody = under ? under.closest('.col-body') : null;
  if(colBody){
    colBody.classList.add('drag-over');
    dragState.targetTier = colBody.dataset.tier;
  }
}

function onCardPointerUp(e){
  if(!dragState) return;
  const { id, fromTier, card, clone, moved } = dragState;
  card.removeEventListener('pointermove', onCardPointerMove);
  card.removeEventListener('pointerup', onCardPointerUp);
  card.removeEventListener('pointercancel', onCardPointerUp);
  clone.remove();
  card.classList.remove('dragging');
  document.querySelectorAll('.col-body.drag-over').forEach(el => el.classList.remove('drag-over'));

  if(moved){
    const under = document.elementFromPoint(e.clientX, e.clientY);
    const colBody = under ? under.closest('.col-body') : null;
    if(colBody){
      const targetTier = colBody.dataset.tier;
      // Einfüge-Index unter den sichtbaren Karten der Zielspalte ermitteln (eigene Karte ausgeklammert)
      const siblings = Array.from(colBody.querySelectorAll('.pcard')).filter(c => c.dataset.id !== id);
      let insertIndex = siblings.length;
      for(let i=0;i<siblings.length;i++){
        const r = siblings[i].getBoundingClientRect();
        if(e.clientY < r.top + r.height/2){ insertIndex = i; break; }
      }
      const fromIdx = board[fromTier].indexOf(id);
      if(fromIdx !== -1) board[fromTier].splice(fromIdx, 1);
      board[targetTier] = board[targetTier] || [];
      board[targetTier].splice(insertIndex, 0, id);
      renderBoard();
      scheduleSave();
    }
  } else {
    // Kein nennenswertes Ziehen erkannt → als Klick werten und Spieler-Vergleich öffnen
    openComparison(id);
  }
  dragState = null;
}

function scheduleSave(){
  if(!editable || !currentUser) return;
  document.getElementById('save-indicator').classList.remove('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    await saveBoard(currentUser.uid, effectiveListKey(), currentPositionTag, board);

    ind.textContent = 'Gespeichert ✓';

async function refreshUserList(){
  allRankings = await listAllRankings();
  // Falls der eingeloggte Nutzer noch kein sichtbares Ranking-Dokument hat (ganz neuer Account), trotzdem anzeigen
  if(currentUser && !allRankings.find(r => r.id === currentUser.uid)){
    allRankings = [{ id: currentUser.uid, displayName: currentUser.displayName || currentUser.email }, ...allRankings];
  }
  allRankings.sort((a,b) => (a.displayName||'').localeCompare(b.displayName||'', 'de', { sensitivity: 'base' }));

  if(!allRankings.length){
    userAvatars.innerHTML = '<span style="font-size:11px;color:var(--muted);">Noch keine Rankings vorhanden</span>';
    document.getElementById('board-wrap').innerHTML = `<div class="empty-state"><h3>Noch keine Rankings</h3><p>Melde dich an, um das erste Ranking zu erstellen.</p></div>`;
    return;
  }

  userAvatars.innerHTML = allRankings.map(r => {
    const img = avatarFor(r.displayName);
    const initial = (r.displayName || '?')[0].toUpperCase();
    const visual = img
      ? `<img class="avatar-img" src="${img}" alt="${r.displayName||''}">`
      : `<div class="avatar-fallback">${initial}</div>`;
    return `<button class="avatar-item" data-uid="${r.id}" title="${r.displayName||'Unbenannt'}">
      ${visual}
      <span class="avatar-tip">${r.displayName||'Unbenannt'}</span>
    </button>`;
  }).join('') + `

function markActiveAvatar(userId){
  userAvatars.querySelectorAll('.avatar-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.uid === userId);
  });
}

function switchView(userId){
  if(unsubBoard) unsubBoard();
  unsubOverview();
  viewMode = 'user';
  viewingUserId = userId;
  markActiveAvatar(userId);
  editable = !!(currentUser && currentUser.uid === userId);
  document.getElementById('status-pill').textContent = editable ? 'Bearbeiten' : 'Nur Ansicht';
  document.getElementById('status-pill').className = 'status-pill ' + (editable ? 'status-edit' : 'status-view');
  searchInput.disabled = !editable;
  searchInput.placeholder = editable ? `${currentPositionTag}-Spieler suchen und zur Inbox hinzufügen…` : 'Nur der Owner kann Spieler hinzufügen';
  document.getElementById('search-hint').textContent = editable
    ? 'Ziehe Spieler per Drag & Drop in die Tiers. Änderungen werden automatisch gespeichert.'
    : (currentUser ? 'Du siehst das Ranking eines anderen Nutzers (nur Ansicht).' : 'Melde dich an, um dein eigenes Ranking zu bearbeiten.');

  unsubBoard = watchBoard(userId, effectiveListKey(), data => {
    latestListDoc = data;
    applyBoardFromLatest();
  });
}

function applyBoardFromLatest(){
  board = (latestListDoc && latestListDoc.boards && latestListDoc.boards[currentPositionTag]) ? latestListDoc.boards[currentPositionTag] : emptyBoard();
  TIERS.forEach(t => { if(!board[t]) board[t] = []; });
  renderBoard();
}

// ── OVERVIEW (Konsens aus allen Rankings) ──────────────────────────────
let overviewUnsubs = [];
let overviewDocs = {}; // userId -> Firestore-Listendokument (alle 3 Positions-Boards)

function unsubOverview(){
  overviewUnsubs.forEach(u => u());
  overviewUnsubs = [];
}

function switchToOverview(){
  if(unsubBoard) unsubBoard();
  unsubOverview();
  viewMode = 'overview';
  viewingUserId = null;
  editable = false;
  markActiveAvatar('__overview__');
  document.getElementById('status-pill').textContent = 'Konsens';
  document.getElementById('status-pill').className = 'status-pill status-view';
  searchInput.disabled = true;
  searchInput.placeholder = 'Konsens-Ansicht – keine Bearbeitung möglich';
  document.getElementById('search-hint').textContent = 'Automatisch berechneter Konsens aus allen Rankings dieses Formats/dieser Position — rein informativ, nicht editierbar.';

  overviewDocs = {};
  allRankings.forEach(u => {
    const unsub = watchBoard(u.id, effectiveListKey(), data => {
      overviewDocs[u.id] = data;
      renderOverviewBoard();
    });
    overviewUnsubs.push(unsub);
  });
}

// Errechnet pro Spieler einen Konsens-Wert: Tier ist der Haupttreiber (vergleichbar
// trotz unterschiedlich großer Tiers pro Nutzer), der Rang innerhalb des Tiers dient
// nur als feine Sortierung innerhalb des Konsens-Tiers, nicht als harte Platzierung.
function computeOverview(){
  const playerAgg = {}; // sleeper_id -> { records: [{userId, tier}], sumValue }
  allRankings.forEach(u => {
    const doc = overviewDocs[u.id];
    const posBoard = doc && doc.boards && doc.boards[currentPositionTag];
    if(!posBoard) return;
    TIERS.filter(t => t !== 'inbox').forEach(tierKey => {
      const tierNum = parseInt(tierKey.slice(1), 10);
      const arr = posBoard[tierKey] || [];
      const size = arr.length;
      arr.forEach((pid, i) => {
        const rankInTier = i + 1;
        const value = tierNum + (rankInTier / (size + 1)) * 0.9; // bleibt strikt innerhalb [tierNum, tierNum+0.9]
        if(!playerAgg[pid]) playerAgg[pid] = { records: [] };
        playerAgg[pid].records.push({ userId: u.id, tier: tierNum, value });
      });
    });
  });

  const results = Object.entries(playerAgg).map(([pid, agg]) => {
    const avg = agg.records.reduce((s,r) => s + r.value, 0) / agg.records.length;
    const consensusTier = Math.max(1, Math.min(7, Math.floor(avg)));
    return { pid, avg, consensusTier, raterCount: agg.records.length, records: agg.records };
  });
  results.sort((a,b) => a.avg - b.avg || b.raterCount - a.raterCount);

  const buckets = {1:[],2:[],3:[],4:[],5:[],6:[],7:[]};
  results.forEach(r => buckets[r.consensusTier].push(r));
  return buckets;
}

function renderOverviewBoard(){
  const wrap = document.getElementById('board-wrap');
  const buckets = computeOverview();
  const totalRaters = allRankings.length;

  const colsHtml = ['t1','t2','t3','t4','t5','t6','t7'].map(tierKey => {
    const tierNum = parseInt(tierKey.slice(1), 10);
    const list = buckets[tierNum] || [];
    const cards = list.map(r => {
      const p = playerMap[r.pid];
      if(!p) return '';
      const warn = r.raterCount < totalRaters ? `<span class="ov-rater-warn">nur ${r.raterCount}/${totalRaters}</span>` : '';
      const perUserTags = allRankings.map(u => {
        const rec = r.records.find(x => x.userId === u.id);
        return `<span class="ov-user-tag${rec?'':' ov-user-tag-none'}" title="${u.displayName||''}">${rec ? 'T'+rec.tier : '–'}</span>`;
      }).join('');
      return `<div class="pcard" data-id="${r.pid}">
        ${headshotHtml(p)}
        <div class="pcard-info">
          <div class="pcard-name">${p.full_name}</div>
          <div class="pcard-sub">${(p.positions||[p.position]).join('/')} · ${p.team||'FA'} ${warn}</div>
          <div class="ov-user-tags">${perUserTags}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="col ${'tier-'+tierNum}" data-tier="${tierKey}">
      <div class="col-hdr">
        <div class="col-hdr-title">${TIER_LABELS[tierKey]}</div>
        <div class="col-hdr-count">${list.length}</div>
      </div>
      <div class="col-body">${cards || '<div class="col-empty">Leer</div>'}</div>
    </div>`;
  }).join('');

  wrap.innerHTML = `<div class="board">${colsHtml}</div>`;
  wrap.querySelectorAll('.pcard').forEach(card => {
    card.style.cursor = 'pointer';
    card.addEventListener('click', () => openComparison(card.dataset.id));
  });
}

function switchPosition(pos){
  currentPositionTag = pos;
  document.querySelectorAll('.pos-tab').forEach(b => b.classList.toggle('active', b.dataset.pos === pos));
  if(editable) searchInput.placeholder = `${currentPositionTag}-Spieler suchen und zur Inbox hinzufügen…`;
  if(viewMode === 'overview') renderOverviewBoard();
  else applyBoardFromLatest();
}

document.querySelectorAll('.pos-tab').forEach(btn => {
  btn.addEventListener('click', () => switchPosition(btn.dataset.pos));
});

document.querySelectorAll('.fmt-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentListType = btn.dataset.fmt;
    document.querySelectorAll('.fmt-tab').forEach(b => b.classList.toggle('active', b === btn));
    document.getElementById('year-group').style.display = currentListType === 'rookie' ? 'flex' : 'none';
    if(viewMode === 'overview') switchToOverview();
    else switchView(viewingUserId);
  });
});
document.getElementById('year-select').addEventListener('change', e => {
  currentRookieYear = parseInt(e.target.value, 10);
  if(viewMode === 'overview') switchToOverview();
  else switchView(viewingUserId);
});

// ── CSV EXPORT ───────────────────────────────────────────────────────────
function csvEscape(val){
  const s = String(val ?? '');
  return /[",;\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
}

document.getElementById('export-btn').addEventListener('click', () => {
  if(!latestListDoc || !latestListDoc.boards){ alert('Kein Ranking zum Exportieren vorhanden.'); return; }
  const rows = [['Position','Tier','Rang','Spieler','Team']];
  const posOrder = ['DL','LB','DB'];
  posOrder.forEach(pos => {
    const posBoard = latestListDoc.boards[pos];
    if(!posBoard) return;
    let rank = 0;
    TIERS.filter(t => t !== 'inbox').forEach(tierKey => {
      const ids = posBoard[tierKey] || [];
      ids.forEach(id => {
        rank++;
        const p = playerMap[id];
        rows.push([pos, TIER_LABELS[tierKey], rank, p ? p.full_name : id, p ? (p.team||'FA') : '']);
      });
    });
  });
  const csv = rows.map(r => r.map(csvEscape).join(';')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ownerName = allRankings.find(r => r.id === viewingUserId)?.displayName || (currentUser && currentUser.uid === viewingUserId ? (currentUser.displayName||'ranking') : 'ranking');
  const listLabel = currentListType === 'rookie' ? `rookie_${currentRookieYear}` : currentListType;
  a.href = url;
  a.download = `${ownerName}_${listLabel}_ranking.csv`.replace(/\s+/g,'_');
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});

// ── AUTH (gleiches Muster wie index.html) ──────────────────────────────
const authWrap = document.getElementById('auth-wrap');
const overlay = document.getElementById('modal-overlay');
const errEl = document.getElementById('modal-error');

document.getElementById('auth-open-btn').addEventListener('click', () => overlay.classList.add('open'));
document.getElementById('modal-close-btn').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
function showErr(msg){ errEl.textContent = msg; errEl.classList.add('show'); }
function mapAuthError(e){
  const c = e.code || '';
  if(c.includes('invalid-credential')||c.includes('wrong-password')||c.includes('user-not-found')) return 'Benutzername oder Passwort falsch.';
  return 'Fehler: ' + (e.message || 'unbekannt');
}
document.getElementById('login-submit').addEventListener('click', async () => {
  errEl.classList.remove('show');
  try{ await loginUser(document.getElementById('login-email').value, document.getElementById('login-pw').value); overlay.classList.remove('open'); }
  catch(e){ showErr(mapAuthError(e)); }
});

watchAuth(async user => {
  currentUser = user;
  document.getElementById('nav-scouting-link').style.display = user ? '' : 'none';
  if(user){
    const initial = (user.displayName || user.email || '?')[0].toUpperCase();
    authWrap.innerHTML = `<div class="auth-user"><div class="auth-avatar">${initial}</div><div><div class="auth-name">${user.displayName||user.email}</div><button class="auth-logout" id="logout-btn">Logout</button></div></div>`;
    document.getElementById('logout-btn').addEventListener('click', () => logoutUser());
  } else {
    authWrap.innerHTML = `<button class="auth-btn" id="auth-open-btn">Login</button>`;
    document.getElementById('auth-open-btn').addEventListener('click', () => overlay.classList.add('open'));
  }
  await refreshUserList();
});

// ── INIT ─────────────────────────────────────────────────────────────────
(async () => {
  await loadAllPlayers();
  await loadTop50Leaderboard();
  if(viewingUserId) renderBoard(); // Board ggf. mit frisch geladenen Top-50-Vorschlägen neu zeichnen
})();
</script>
