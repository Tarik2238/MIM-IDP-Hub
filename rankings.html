<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDP Rankings · Mics in Motion</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c10;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2128;
  --border:#21262d;--border2:#30363d;
  --text:#e6edf3;--muted:#7d8590;--muted2:#9198a1;
  --orange:#C4722A;--orange-dim:#7a4419;--orange-glow:rgba(196,114,42,.15);
  --green:#238636;--green-light:#2ea043;--red:#da3633;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

/* NAV (shared pattern) */
nav{background:rgba(13,17,23,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#fff;text-decoration:none;}
.brand em{color:var(--orange);font-style:normal;}
.nav-mid{display:flex;gap:4px;}
.nav-link{font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .15s;}
.nav-link:hover{color:var(--text);background:var(--bg3);}
.nav-link.active{color:var(--orange);background:var(--orange-glow);}

/* AUTH WIDGET + MODAL (shared with index.html) */
.auth-wrap{display:flex;align-items:center;gap:10px;}
.auth-btn{font-size:12px;font-weight:600;letter-spacing:.5px;color:var(--text);background:var(--bg3);border:1px solid var(--border);padding:7px 16px;border-radius:6px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.auth-btn:hover{border-color:var(--orange);}
.auth-user{display:flex;align-items:center;gap:10px;}
.auth-avatar{width:30px;height:30px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;}
.auth-name{font-size:13px;font-weight:500;color:var(--text);}
.auth-logout{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:'Inter',sans-serif;}
.auth-logout:hover{color:var(--text);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(3px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:32px;width:100%;max-width:360px;position:relative;}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#fff;margin-bottom:4px;}
.modal-tabs{display:flex;gap:4px;margin:16px 0 20px;border-bottom:1px solid var(--border);}
.modal-tab{flex:1;text-align:center;padding:8px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:1px;text-transform:uppercase;}
.modal-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.modal-field{margin-bottom:14px;}
.modal-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;}
.modal-field input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;}
.modal-field input:focus{border-color:var(--orange);}
.modal-submit{width:100%;background:var(--orange);color:#fff;border:none;padding:11px;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;margin-top:6px;font-family:'Inter',sans-serif;}
.modal-submit:hover{opacity:.9;}
.modal-error{color:var(--red);font-size:12px;margin-top:10px;display:none;}
.modal-error.show{display:block;}
.modal-pane{display:none;}
.modal-pane.active{display:block;}

/* TOOLBAR */
.toolbar{padding:20px 32px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:#fff;margin-right:auto;}
.tb-title span{color:var(--orange);}
.tb-group{display:flex;flex-direction:column;gap:6px;}
.tb-group label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.tb-select{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:9px 12px;min-width:220px;outline:none;}
.tb-select:focus{border-color:var(--orange);}
.pos-tabs{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:3px;}
.pos-tab{background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;padding:7px 16px;border-radius:6px;cursor:pointer;transition:all .15s;}
.pos-tab:hover{color:var(--text);}
.pos-tab.active{background:var(--orange);color:#fff;}
.status-pill{font-size:11px;padding:5px 12px;border-radius:20px;font-weight:600;letter-spacing:.5px;white-space:nowrap;}.status-edit{background:rgba(46,160,67,.12);color:var(--green-light);border:1px solid rgba(46,160,67,.25);}
.status-view{background:var(--bg3);color:var(--muted);border:1px solid var(--border2);}
.save-indicator{font-size:11px;color:var(--muted);opacity:0;transition:opacity .3s;}
.save-indicator.show{opacity:1;}

/* SEARCH */
.search-bar{padding:16px 32px;border-bottom:1px solid var(--border);background:var(--bg);position:relative;}
.search-input-wrap{position:relative;max-width:420px;}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:10px 14px;outline:none;}
.search-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-glow);}
.search-input:disabled{opacity:.4;cursor:not-allowed;}
.search-hint{font-size:11px;color:var(--muted);margin-top:6px;}
.search-res{position:absolute;top:calc(100% + 6px);left:0;width:100%;max-width:420px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);z-index:150;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;max-height:320px;overflow-y:auto;}
.search-res.open{display:block;}
.sri{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--border);}
.sri:last-child{border-bottom:none;}
.sri:hover{background:var(--bg4);}
.sri-hs{width:30px;height:30px;border-radius:4px;object-fit:cover;object-position:top;background:var(--bg2);flex-shrink:0;}
.sri-fb{width:30px;height:30px;border-radius:4px;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--muted);}
.sri-name{font-weight:600;font-size:13px;}
.sri-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.sri-added{font-size:10px;color:var(--muted);margin-left:auto;font-style:italic;}

/* BOARD */
.board-wrap{padding:24px 32px 60px;overflow-x:auto;}
.board{display:flex;gap:14px;min-width:fit-content;}
.col{width:210px;flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;max-height:calc(100vh - 260px);}
.col-inbox{border-style:dashed;border-color:var(--border2);}
.col-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:var(--radius) var(--radius) 0 0;}
.col-hdr-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;color:#fff;}
.col-hdr-count{font-size:11px;color:var(--muted);background:var(--bg4);border-radius:10px;padding:2px 8px;}
.tier-1 .col-hdr-title{color:#e0464a;}
.tier-2 .col-hdr-title{color:var(--orange);}
.tier-3 .col-hdr-title{color:#d4a72c;}
.tier-4 .col-hdr-title{color:var(--green-light);}
.tier-5 .col-hdr-title{color:#58a6ff;}
.tier-6 .col-hdr-title{color:var(--muted2);}
.col-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:80px;}
.col-body.drag-over{background:var(--orange-glow);outline:2px dashed var(--orange);outline-offset:-6px;}
.col-empty{font-size:11px;color:var(--muted);text-align:center;padding:20px 8px;font-style:italic;}

/* CARD */
.pcard{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;display:flex;align-items:center;gap:8px;touch-action:none;user-select:none;position:relative;}
.pcard.editable{cursor:grab;}
.pcard.editable:active{cursor:grabbing;}
.pcard.dragging{opacity:.3;}
.pcard-hs{width:32px;height:32px;border-radius:4px;object-fit:cover;object-position:top;background:var(--bg2);flex-shrink:0;}
.pcard-fb{width:32px;height:32px;border-radius:4px;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--muted);}
.pcard-info{flex:1;min-width:0;}
.pcard-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.pcard-rm{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 4px;flex-shrink:0;line-height:1;}
.pcard-rm:hover{color:var(--red);}

.drag-clone{position:fixed;pointer-events:none;z-index:1000;width:190px;box-shadow:0 12px 30px rgba(0,0,0,.6);border-radius:6px;opacity:.95;transform:rotate(2deg);}

.empty-state{padding:60px 32px;text-align:center;color:var(--muted);}
.empty-state h3{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;letter-spacing:1px;margin-bottom:8px;}

@media(max-width:700px){
  nav{padding:0 20px;}
  .toolbar,.search-bar{padding:16px 20px;}
  .board-wrap{padding:16px 20px 40px;}
  .col{width:160px;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="brand">MICS IN <em>MOTION</em></a>
  <div class="nav-mid">
    <a href="index.html" class="nav-link">Home</a>
    <a href="players.html" class="nav-link">Player DB</a>
    <a href="#" class="nav-link">Team Hub</a>
    <a href="rankings.html" class="nav-link active">IDP Rankings</a>
  </div>
  <div class="auth-wrap" id="auth-wrap">
    <button class="auth-btn" id="auth-open-btn">Login</button>
  </div>
</nav>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close-btn">&times;</button>
    <div class="modal-title">Login</div>
    <div class="modal-field" style="margin-top:16px;"><label>Benutzername</label><input type="text" id="login-email" autocapitalize="off"></div>
    <div class="modal-field"><label>Passwort</label><input type="password" id="login-pw"></div>
    <button class="modal-submit" id="login-submit">Anmelden</button>
    <div class="modal-error" id="modal-error"></div>
  </div>
</div>

<div class="toolbar">
  <div class="tb-title">IDP <span>RANKINGS</span></div>
  <div class="tb-group">
    <label>Position</label>
    <div class="pos-tabs" id="pos-tabs">
      <button class="pos-tab active" data-pos="DL">DL</button>
      <button class="pos-tab" data-pos="LB">LB</button>
      <button class="pos-tab" data-pos="DB">DB</button>
    </div>
  </div>
  <div class="tb-group">
    <label>Liste</label>
    <select class="tb-select" id="list-type-select" style="min-width:140px;">
      <option value="dynasty">Dynasty</option>
      <option value="redraft">Redraft</option>
      <option value="rookie">Rookie</option>
    </select>
  </div>
  <div class="tb-group">
    <label>Ranking ansehen von</label>
    <select class="tb-select" id="user-select"><option>Lade…</option></select>
  </div>
  <span class="status-pill status-view" id="status-pill">Nur Ansicht</span>
  <span class="save-indicator" id="save-indicator">Gespeichert ✓</span>
</div>

<div class="search-bar">
  <div class="search-input-wrap">
    <input type="text" class="search-input" id="player-search" placeholder="Spieler suchen und zur Inbox hinzufügen…" disabled>
    <div class="search-res" id="search-res"></div>
  </div>
  <div class="search-hint" id="search-hint">Melde dich an, um dein eigenes Ranking zu bearbeiten.</div>
</div>

<div class="board-wrap" id="board-wrap">
  <div class="empty-state" id="loading-state"><h3>Lade Spielerdaten…</h3></div>
</div>

<script type="module">
import { watchAuth, loginUser, logoutUser, loadBoard, saveBoard, listAllRankings, watchBoard } from './firebase-init.js';

// ── SLEEPER PLAYER CACHE (wie player.html / players.html) ──────────────────
const SLEEPER_ALL = 'https://api.sleeper.app/v1/players/nfl';
const CACHE_KEY = 'mim_sleeper_players', CACHE_TS = 'mim_sleeper_ts', CACHE_TTL = 23*60*60*1000;
function store(){ try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return localStorage;}catch{return sessionStorage;} }
function idpG(pos,dc){
  const p=(pos||'').toUpperCase(), d=(dc||'').toUpperCase();
  const DL=new Set(['DE','DT','NT','EDGE','IDL','DL']), LB=new Set(['LB','ILB','MLB','OLB']), DB=new Set(['CB','FS','SS','S','DB','SAF']);
  if(p==='OLB') return DB.has(d)?'DB':(DL.has(d)?'DL':'LB');
  if(DL.has(p)&&!LB.has(p)) return 'DL';
  if(LB.has(p)) return 'LB';
  if(DB.has(p)) return 'DB';
  if(DL.has(d)) return 'DL';
  if(LB.has(d)) return 'LB';
  if(DB.has(d)) return 'DB';
  return pos||'DEF';
}
let allPlayers = [];
let playerMap = {}; // sleeper_id -> player

async function loadAllPlayers(){
  const cached = (()=>{ try{ const s=store(), ts=s.getItem(CACHE_TS); if(ts && Date.now()-parseInt(ts)<CACHE_TTL){ const r=s.getItem(CACHE_KEY); return r?JSON.parse(r):null; } }catch{} return null; })();
  if(cached){ allPlayers = cached; }
  else {
    const r = await fetch(SLEEPER_ALL); const data = await r.json();
    const DL=new Set(['DE','DT','NT','EDGE','IDL','DL']), LB=new Set(['LB','ILB','MLB','OLB']), DB=new Set(['CB','FS','SS','S','DB','SAF']);
    allPlayers = Object.entries(data).filter(([,x])=>{ const pos=(x.position||'').toUpperCase(); return DL.has(pos)||LB.has(pos)||DB.has(pos); })
      .map(([id,x])=>({ sleeper_id:id, full_name:x.full_name||`${x.first_name||''} ${x.last_name||''}`.trim(), position:idpG(x.position,x.depth_chart_position), team:x.team||'' }));
    try{ const s=store(); s.setItem(CACHE_KEY, JSON.stringify(allPlayers)); s.setItem(CACHE_TS, Date.now().toString()); }catch{}
  }
  playerMap = {};
  allPlayers.forEach(p => playerMap[p.sleeper_id] = p);
}

// ── STATE ────────────────────────────────────────────────────────────────
const TIERS = ['inbox','t1','t2','t3','t4','t5','t6'];
const TIER_LABELS = { inbox:'Inbox', t1:'Tier 1', t2:'Tier 2', t3:'Tier 3', t4:'Tier 4', t5:'Tier 5', t6:'Tier 6' };
let currentUser = null;              // Firebase user (eingeloggt oder null)
let viewingUserId = null;            // wessen Board wird gerade angezeigt
let currentListType = 'dynasty';     // dynasty | redraft | rookie
let currentPositionTag = 'DL';       // DL | LB | DB
let latestListDoc = null;            // zuletzt empfangenes Firestore-Dokument (alle 3 Positions-Boards)
let board = { inbox:[], t1:[], t2:[], t3:[], t4:[], t5:[], t6:[] };
let editable = false;
let unsubBoard = null;
let saveTimer = null;
let allRankings = [];

function emptyBoard(){ return { inbox:[], t1:[], t2:[], t3:[], t4:[], t5:[], t6:[] }; }

// ── RENDER BOARD ─────────────────────────────────────────────────────────
function headshotHtml(p){
  const url = `https://sleepercdn.com/content/nfl/players/${p.sleeper_id}.jpg`;
  const initials = (p.full_name||'??').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  return `<img class="pcard-hs" src="${url}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="pcard-fb" style="display:none">${initials}</div>`;
}

function renderBoard(){
  const wrap = document.getElementById('board-wrap');
  const html = TIERS.map(tierKey => {
    const ids = board[tierKey] || [];
    const cards = ids.map(id => {
      const p = playerMap[id];
      if(!p) return '';
      return `<div class="pcard ${editable?'editable':''}" data-id="${id}" data-tier="${tierKey}">
        ${headshotHtml(p)}
        <div class="pcard-info">
          <div class="pcard-name">${p.full_name}</div>
          <div class="pcard-sub">${p.position} · ${p.team||'FA'}</div>
        </div>
        ${editable?`<button class="pcard-rm" data-rm="${id}" data-tier="${tierKey}" title="Entfernen">&times;</button>`:''}
      </div>`;
    }).join('');
    return `<div class="col ${tierKey==='inbox'?'col-inbox':'tier-'+tierKey.slice(1)}" data-tier="${tierKey}">
      <div class="col-hdr">
        <div class="col-hdr-title">${TIER_LABELS[tierKey]}</div>
        <div class="col-hdr-count">${ids.length}</div>
      </div>
      <div class="col-body" data-tier="${tierKey}">
        ${cards || `<div class="col-empty">${tierKey==='inbox'?'Spieler per Suche hinzufügen':'Leer'}</div>`}
      </div>
    </div>`;
  }).join('');
  wrap.innerHTML = `<div class="board">${html}</div>`;

  if(editable){
    wrap.querySelectorAll('.pcard-rm').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id = btn.dataset.rm, tier = btn.dataset.tier;
        board[tier] = board[tier].filter(x => x !== id);
        renderBoard();
        scheduleSave();
      });
    });
    wrap.querySelectorAll('.pcard.editable').forEach(card => {
      card.addEventListener('pointerdown', onCardPointerDown);
    });
  }
}

// ── DRAG & DROP (Pointer Events — funktioniert für Maus & Touch) ──────────
let dragState = null;

function onCardPointerDown(e){
  if(e.button !== undefined && e.button !== 0) return;
  const card = e.currentTarget;
  const id = card.dataset.id, fromTier = card.dataset.tier;
  const rect = card.getBoundingClientRect();
  const clone = card.cloneNode(true);
  clone.classList.add('drag-clone');
  clone.style.left = rect.left + 'px';
  clone.style.top = rect.top + 'px';
  clone.style.width = rect.width + 'px';
  document.body.appendChild(clone);
  card.classList.add('dragging');

  dragState = {
    id, fromTier, card, clone,
    offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top,
    targetTier: fromTier
  };
  card.setPointerCapture(e.pointerId);
  card.addEventListener('pointermove', onCardPointerMove);
  card.addEventListener('pointerup', onCardPointerUp);
  card.addEventListener('pointercancel', onCardPointerUp);
  e.preventDefault();
}

function onCardPointerMove(e){
  if(!dragState) return;
  const { clone, offsetX, offsetY } = dragState;
  clone.style.left = (e.clientX - offsetX) + 'px';
  clone.style.top = (e.clientY - offsetY) + 'px';

  document.querySelectorAll('.col-body.drag-over').forEach(el => el.classList.remove('drag-over'));
  clone.style.pointerEvents = 'none';
  const under = document.elementFromPoint(e.clientX, e.clientY);
  const colBody = under ? under.closest('.col-body') : null;
  if(colBody){
    colBody.classList.add('drag-over');
    dragState.targetTier = colBody.dataset.tier;
  }
}

function onCardPointerUp(e){
  if(!dragState) return;
  const { id, fromTier, card, clone, targetTier } = dragState;
  card.removeEventListener('pointermove', onCardPointerMove);
  card.removeEventListener('pointerup', onCardPointerUp);
  card.removeEventListener('pointercancel', onCardPointerUp);
  clone.remove();
  card.classList.remove('dragging');
  document.querySelectorAll('.col-body.drag-over').forEach(el => el.classList.remove('drag-over'));

  if(targetTier && targetTier !== fromTier){
    board[fromTier] = board[fromTier].filter(x => x !== id);
    board[targetTier] = board[targetTier] || [];
    board[targetTier].push(id);
    renderBoard();
    scheduleSave();
  }
  dragState = null;
}

function scheduleSave(){
  if(!editable || !currentUser) return;
  document.getElementById('save-indicator').classList.remove('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    await saveBoard(currentUser.uid, currentListType, currentPositionTag, board);
    const ind = document.getElementById('save-indicator');
    ind.textContent = 'Gespeichert ✓';
    ind.classList.add('show');
    setTimeout(()=>ind.classList.remove('show'), 2000);
  }, 500);
}

// ── SEARCH ──────────────────────────────────────────────────────────────
const searchInput = document.getElementById('player-search');
const searchRes = document.getElementById('search-res');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if(q.length < 2){ searchRes.classList.remove('open'); return; }
  const allAssigned = new Set(Object.values(board).flat());
  const hits = allPlayers.filter(p => p.position === currentPositionTag && (p.full_name||'').toLowerCase().includes(q)).slice(0, 8);
  if(!hits.length){ searchRes.innerHTML = `<div class="sri"><div class="sri-sub">Keine ${currentPositionTag}-Treffer</div></div>`; searchRes.classList.add('open'); return; }
  searchRes.innerHTML = hits.map(p => {
    const already = allAssigned.has(p.sleeper_id);
    return `<div class="sri" data-add="${p.sleeper_id}">
      ${headshotHtml(p).replace('pcard-hs','sri-hs').replace('pcard-fb','sri-fb')}
      <div>
        <div class="sri-name">${p.full_name}</div>
        <div class="sri-sub">${p.position} · ${p.team||'FA'}</div>
      </div>
      ${already?'<div class="sri-added">bereits im Board</div>':''}
    </div>`;
  }).join('');
  searchRes.classList.add('open');
  searchRes.querySelectorAll('.sri[data-add]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.add;
      const allAssigned2 = new Set(Object.values(board).flat());
      if(!allAssigned2.has(id)){
        board.inbox.push(id);
        renderBoard();
        scheduleSave();
      }
      searchInput.value = '';
      searchRes.classList.remove('open');
    });
  });
});
document.addEventListener('click', e => {
  if(!e.target.closest('.search-input-wrap')) searchRes.classList.remove('open');
});

// ── USER SELECT / VIEW SWITCHING ───────────────────────────────────────
const userSelect = document.getElementById('user-select');

async function refreshUserList(){
  allRankings = await listAllRankings();
  const opts = allRankings.map(r => `<option value="${r.id}">${r.displayName || 'Unbenannt'}</option>`);
  userSelect.innerHTML = opts.length ? opts.join('') : '<option value="">Noch keine Rankings vorhanden</option>';
  if(currentUser){
    if(!allRankings.find(r => r.id === currentUser.uid)){
      userSelect.insertAdjacentHTML('afterbegin', `<option value="${currentUser.uid}">${currentUser.displayName || currentUser.email} (Du)</option>`);
    }
    userSelect.value = currentUser.uid;
    switchView(currentUser.uid, currentListType);
  } else if(allRankings.length){
    userSelect.value = allRankings[0].id;
    switchView(allRankings[0].id, currentListType);
  } else {
    document.getElementById('board-wrap').innerHTML = `<div class="empty-state"><h3>Noch keine Rankings</h3><p>Melde dich an, um das erste Ranking zu erstellen.</p></div>`;
  }
}

function switchView(userId, listType){
  if(unsubBoard) unsubBoard();
  viewingUserId = userId;
  currentListType = listType;
  editable = !!(currentUser && currentUser.uid === userId);
  document.getElementById('status-pill').textContent = editable ? 'Bearbeiten' : 'Nur Ansicht';
  document.getElementById('status-pill').className = 'status-pill ' + (editable ? 'status-edit' : 'status-view');
  searchInput.disabled = !editable;
  searchInput.placeholder = editable ? `${currentPositionTag}-Spieler suchen und zur Inbox hinzufügen…` : 'Nur der Owner kann Spieler hinzufügen';
  document.getElementById('search-hint').textContent = editable
    ? 'Ziehe Spieler per Drag & Drop in die Tiers. Änderungen werden automatisch gespeichert.'
    : (currentUser ? 'Du siehst das Ranking eines anderen Nutzers (nur Ansicht).' : 'Melde dich an, um dein eigenes Ranking zu bearbeiten.');

  unsubBoard = watchBoard(userId, listType, data => {
    latestListDoc = data;
    applyBoardFromLatest();
  });
}

function applyBoardFromLatest(){
  board = (latestListDoc && latestListDoc.boards && latestListDoc.boards[currentPositionTag]) ? latestListDoc.boards[currentPositionTag] : emptyBoard();
  TIERS.forEach(t => { if(!board[t]) board[t] = []; });
  renderBoard();
}

function switchPosition(pos){
  currentPositionTag = pos;
  document.querySelectorAll('.pos-tab').forEach(b => b.classList.toggle('active', b.dataset.pos === pos));
  if(editable) searchInput.placeholder = `${currentPositionTag}-Spieler suchen und zur Inbox hinzufügen…`;
  applyBoardFromLatest();
}

document.querySelectorAll('.pos-tab').forEach(btn => {
  btn.addEventListener('click', () => switchPosition(btn.dataset.pos));
});

userSelect.addEventListener('change', () => switchView(userSelect.value, currentListType));
document.getElementById('list-type-select').addEventListener('change', e => switchView(viewingUserId, e.target.value));

// ── AUTH (gleiches Muster wie index.html) ──────────────────────────────
const authWrap = document.getElementById('auth-wrap');
const overlay = document.getElementById('modal-overlay');
const errEl = document.getElementById('modal-error');

document.getElementById('auth-open-btn').addEventListener('click', () => overlay.classList.add('open'));
document.getElementById('modal-close-btn').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
function showErr(msg){ errEl.textContent = msg; errEl.classList.add('show'); }
function mapAuthError(e){
  const c = e.code || '';
  if(c.includes('invalid-credential')||c.includes('wrong-password')||c.includes('user-not-found')) return 'Benutzername oder Passwort falsch.';
  return 'Fehler: ' + (e.message || 'unbekannt');
}
document.getElementById('login-submit').addEventListener('click', async () => {
  errEl.classList.remove('show');
  try{ await loginUser(document.getElementById('login-email').value, document.getElementById('login-pw').value); overlay.classList.remove('open'); }
  catch(e){ showErr(mapAuthError(e)); }
});

watchAuth(async user => {
  currentUser = user;
  if(user){
    const initial = (user.displayName || user.email || '?')[0].toUpperCase();
    authWrap.innerHTML = `<div class="auth-user"><div class="auth-avatar">${initial}</div><div><div class="auth-name">${user.displayName||user.email}</div><button class="auth-logout" id="logout-btn">Logout</button></div></div>`;
    document.getElementById('logout-btn').addEventListener('click', () => logoutUser());
  } else {
    authWrap.innerHTML = `<button class="auth-btn" id="auth-open-btn">Login</button>`;
    document.getElementById('auth-open-btn').addEventListener('click', () => overlay.classList.add('open'));
  }
  await refreshUserList();
});

// ── INIT ─────────────────────────────────────────────────────────────────
loadAllPlayers();
</script>
