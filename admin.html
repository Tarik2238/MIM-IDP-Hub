<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Mics in Motion</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c10;--bg2:#0d1117;--bg3:#161b22;--border:#21262d;--border2:#30363d;--text:#e6edf3;--muted:#7d8590;--orange:#C4722A;--orange-glow:rgba(196,114,42,.15);--red:#da3633;--green-light:#2ea043;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:36px;width:100%;max-width:400px;}
.title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#fff;margin-bottom:4px;}
.title span{color:var(--orange);}
.sub{font-size:12px;color:var(--muted);margin-bottom:24px;line-height:1.5;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
.field input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;}
.field input:focus{border-color:var(--orange);}
.submit{width:100%;background:var(--orange);color:#fff;border:none;padding:11px;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;margin-top:8px;font-family:'Inter',sans-serif;}
.submit:hover{opacity:.9;}
.submit:disabled{opacity:.5;cursor:not-allowed;}
.msg{font-size:12px;margin-top:14px;padding:10px 12px;border-radius:6px;display:none;}
.msg.err{display:block;background:rgba(218,54,51,.1);color:var(--red);border:1px solid rgba(218,54,51,.25);}
.msg.ok{display:block;background:rgba(46,160,67,.1);color:var(--green-light);border:1px solid rgba(46,160,67,.25);}
.list{margin-top:28px;border-top:1px solid var(--border);padding-top:20px;}
.list h3{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.list-item{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);}
</style>
</head>
<body>

<div class="box">
  <div class="title">MIM <span>ADMIN</span></div>
  <div class="sub">Feste Accounts für Liga-Mitglieder anlegen. Diese Seite ist nicht in der Navigation verlinkt — Link nicht öffentlich teilen.</div>

  <div class="field"><label>Benutzername</label><input type="text" id="username" placeholder="z.B. tarik"></div>
  <div class="field"><label>Anzeigename</label><input type="text" id="displayname" placeholder="z.B. Tarik"></div>
  <div class="field"><label>Passwort (mind. 6 Zeichen)</label><input type="text" id="password" placeholder="Startpasswort festlegen"></div>
  <button class="submit" id="create-btn">Account anlegen</button>
  <div class="msg" id="msg"></div>

  <div class="list">
    <h3>Bereits angelegte Rankings</h3>
    <div id="user-list">Lade…</div>
  </div>
</div>

<script type="module">
import { createFixedUser, logoutUser, listAllRankings } from './firebase-init.js';

const msgEl = document.getElementById('msg');
const btn = document.getElementById('create-btn');

async function refreshList(){
  try{
    const all = await listAllRankings();
    const listEl = document.getElementById('user-list');
    listEl.innerHTML = all.length
      ? all.map(r => `<div class="list-item"><span>${r.displayName||'Unbenannt'}</span></div>`).join('')
      : '<div style="color:var(--muted);font-size:13px;">Noch keine Accounts</div>';
  }catch(e){
    document.getElementById('user-list').innerHTML = '<div style="color:var(--muted);font-size:13px;">Konnte Liste nicht laden (evtl. Firestore-Regeln noch nicht gesetzt)</div>';
  }
}

btn.addEventListener('click', async () => {
  msgEl.className = 'msg';
  const username = document.getElementById('username').value.trim();
  const displayname = document.getElementById('displayname').value.trim();
  const password = document.getElementById('password').value;
  if(!username || !displayname || password.length < 6){
    msgEl.textContent = 'Bitte alle Felder ausfüllen (Passwort mind. 6 Zeichen).';
    msgEl.classList.add('err');
    return;
  }
  btn.disabled = true;
  try{
    await createFixedUser(username, password, displayname);
    // Firebase meldet uns automatisch als den neuen User an — direkt wieder ausloggen,
    // damit dieses Gerät nicht versehentlich als der neue Account eingeloggt bleibt.
    await logoutUser();
    msgEl.textContent = `Account "${displayname}" (Benutzername: ${username}) wurde angelegt.`;
    msgEl.classList.add('ok');
    document.getElementById('username').value = '';
    document.getElementById('displayname').value = '';
    document.getElementById('password').value = '';
    refreshList();
  }catch(e){
    const c = e.code || '';
    let text = 'Fehler: ' + (e.message || 'unbekannt');
    if(c.includes('email-already-in-use')) text = 'Dieser Benutzername ist bereits vergeben.';
    if(c.includes('weak-password')) text = 'Passwort muss mind. 6 Zeichen haben.';
    msgEl.textContent = text;
    msgEl.classList.add('err');
  }
  btn.disabled = false;
});

refreshList();
</script>

</body>
</html>
